<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pace Within" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>Pace Within</title>
  <style>
:root {
  --bg: #0b0d12;
  --panel: rgba(255,255,255,.075);
  --panel-strong: rgba(255,255,255,.11);
  --line: rgba(255,255,255,.13);
  --text: #f5f7fb;
  --muted: rgba(245,247,251,.62);
  --gold: #d7b56d;
  --danger: #ff6b6b;
  --success: #61d394;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, var(--bg), #11141c);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
}

body {
  padding-bottom: calc(66px + var(--safe-bottom));
}

button, input, textarea {
  font: inherit;
}

button {
  border: 0;
  border-radius: 999px;
  padding: 9px 12px;
  font-weight: 750;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--line);
}

button:active {
  transform: scale(.98);
}

.primary {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
  border: 0;
}

.danger {
  color: white;
  background: rgba(255,107,107,.2);
  border: 1px solid rgba(255,107,107,.35);
}

.success {
  color: #06120c;
  background: linear-gradient(135deg, #a7f3c5, #45d383);
  border: 0;
}

.app {
  max-width: 860px;
  margin: 0 auto;
  padding: calc(10px + var(--safe-top)) 10px 18px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 10px;
}

.eyebrow {
  color: var(--gold);
  font-size: 10px;
  font-weight: 850;
  letter-spacing: .13em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

h1 {
  margin: 0;
  font-size: 26px;
  letter-spacing: -.045em;
  line-height: 1;
}

.subtitle {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.3;
  margin-top: 5px;
}

.icon-btn {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  font-size: 24px;
  padding: 0;
}

.segment {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  padding: 4px;
  margin: 8px 0;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.055);
  border-radius: 15px;
}

.segment button {
  border: 0;
  background: transparent;
  color: var(--muted);
  padding: 7px 9px;
  border-radius: 11px;
}

.segment button.active {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
}

.search {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.075);
  color: var(--text);
  border-radius: 15px;
  padding: 9px 12px;
  margin: 8px 0 10px;
  outline: 0;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
  margin-bottom: 9px;
}

.stat {
  min-height: 44px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.065);
  padding: 7px 9px;
}

.stat strong {
  display: block;
  font-size: 17px;
  line-height: 1;
}

.stat span {
  color: var(--muted);
  font-size: 10px;
}

.list {
  display: grid;
  gap: 7px;
}

.counter {
  min-height: 72px;
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(140deg, var(--panel-strong), var(--panel));
  position: relative;
  overflow: hidden;
}

.counter::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, var(--accent), transparent 58%);
  opacity: .16;
  pointer-events: none;
}

.counter > * {
  position: relative;
}

.emoji {
  width: 36px;
  height: 36px;
  display: grid;
  place-items: center;
  border-radius: 13px;
  background: rgba(255,255,255,.08);
  border: 1px solid var(--line);
  font-size: 20px;
}

.counter h2 {
  margin: 0 0 3px;
  font-size: 16px;
  line-height: 1.05;
}

.counter p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.2;
}

.count {
  font-size: 34px;
  font-weight: 950;
  letter-spacing: -.08em;
}

.empty {
  padding: 22px 12px;
  border: 1px dashed var(--line);
  border-radius: 15px;
  color: var(--muted);
  text-align: center;
  font-size: 13px;
}

.detail-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: linear-gradient(140deg, var(--panel-strong), var(--panel));
  padding: 12px;
  position: relative;
  overflow: hidden;
}

.detail-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top right, var(--accent), transparent 58%);
  opacity: .16;
  pointer-events: none;
}

.detail-top {
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 10px;
  align-items: center;
  position: relative;
}

.detail-top h2 {
  margin: 0;
  font-size: 20px;
}

.detail-count {
  font-size: 40px;
  font-weight: 950;
  letter-spacing: -.08em;
}

.detail-sub {
  position: relative;
  color: var(--muted);
  font-size: 11px;
  margin: 3px 0 9px 46px;
}

.actions {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  position: relative;
}

.actions .wide {
  width: 100%;
  justify-content: center;
  padding: 11px 12px;
  font-size: 15px;
}

.section-title {
  display: flex;
  justify-content: space-between;
  margin: 12px 3px 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 850;
  letter-spacing: .08em;
  text-transform: uppercase;
}

.entry {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: rgba(255,255,255,.065);
  padding: 9px 10px;
}

.entry strong {
  font-size: 13px;
}

.entry p {
  margin: 3px 0 0;
  color: var(--muted);
  white-space: pre-wrap;
  font-size: 12px;
}

.settings-group {
  margin-top: 12px;
}

.settings-row {
  min-height: 38px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--line);
  border-radius: 13px;
  background: rgba(255,255,255,.065);
  padding: 9px 10px;
  font-size: 13px;
  margin-bottom: 6px;
}

.settings-row span:last-child {
  color: var(--muted);
}

.tabbar {
  position: fixed;
  z-index: 50;
  left: 50%;
  bottom: calc(6px + var(--safe-bottom));
  transform: translateX(-50%);
  width: min(92vw, 520px);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 5px;
  padding: 5px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(20,22,30,.86);
  backdrop-filter: blur(18px);
}

.tab {
  display: grid;
  gap: 1px;
  place-items: center;
  padding: 6px 2px;
  border: 0;
  background: transparent;
  color: var(--muted);
  font-size: 15px;
}

.tab span {
  font-size: 11px;
}

.tab.active {
  color: #15120b;
  background: linear-gradient(135deg, #f4dc9f, #caa45f);
}

dialog {
  width: min(92vw, 390px);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 0;
  background: #171a22;
  color: var(--text);
  box-shadow: 0 30px 80px rgba(0,0,0,.55);
}

dialog::backdrop {
  background: rgba(0,0,0,.58);
  backdrop-filter: blur(4px);
}

.modal {
  padding: 12px;
}

.modal h2 {
  font-size: 18px;
  margin: 0 0 10px;
}

label {
  display: block;
  color: var(--muted);
  font-size: 10px;
  font-weight: 850;
  letter-spacing: .11em;
  text-transform: uppercase;
  margin: 8px 0 4px;
}

input, textarea {
  width: 100%;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.08);
  color: var(--text);
  border-radius: 13px;
  padding: 9px 10px;
  outline: 0;
}

textarea {
  min-height: 64px;
}

.modal-grid {
  display: grid;
  grid-template-columns: 58px 1fr;
  gap: 8px;
}

.swatches {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}

.swatch {
  height: 26px;
  border-radius: 999px;
  border: 2px solid transparent;
}

.swatch.active {
  border-color: white;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

  
.lock-note {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.3;
}

.settings-row.danger {
  color: white;
  background: rgba(255,107,107,.18);
  border: 1px solid rgba(255,107,107,.35);
}


/* v2.1.1 iOS overscroll fix */
html {
  background: #0b0d12 !important;
  min-height: 100%;
  overscroll-behavior-y: none;
}

body {
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, #0b0d12, #11141c) !important;
  min-height: 100svh;
  overscroll-behavior-y: none;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at top left, rgba(215,181,109,.16), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(110,168,255,.12), transparent 28rem),
    linear-gradient(180deg, #0b0d12, #11141c);
  pointer-events: none;
}

.app {
  min-height: calc(100svh - 82px - var(--safe-bottom));
}

@supports not (height: 100svh) {
  body {
    min-height: 100vh;
  }

  .app {
    min-height: calc(100vh - 82px - var(--safe-bottom));
  }
}

  --muted: var(--theme-muted);
  --gold: var(--theme-accent);
}

html, body, body::after {
  background:
    radial-gradient(circle at top left, var(--theme-glow-a), transparent 32rem),
    radial-gradient(circle at bottom right, var(--theme-glow-b), transparent 28rem),
    linear-gradient(180deg, var(--theme-bg), var(--theme-bg2)) !important;
}

.primary,
.segment button.active,
.tab.active {
  background: linear-gradient(135deg, color-mix(in srgb, var(--theme-accent) 80%, white), var(--theme-accent2)) !important;

}

:root[data-theme="arctic-white"] .primary,
:root[data-theme="arctic-white"] .segment button.active,

}

.detail-card,
.counter {

}

}

/* v2.2.1 Compact overscroll fix */
html,
body {
  background-color: var(--theme-bg) !important;
  min-height: 100svh !important;
  overflow-x: hidden !important;
}

body {
  position: relative;
}

.app {
  min-height: calc(100svh - 56px - var(--safe-bottom)) !important;
  padding-bottom: calc(18px + var(--safe-bottom)) !important;
}

:root[data-size="compact"] .app {
  min-height: calc(100svh - 44px - var(--safe-bottom)) !important;
  padding-bottom: calc(26px + var(--safe-bottom)) !important;
}

:root[data-size="compact"] body {
  padding-bottom: calc(72px + var(--safe-bottom)) !important;
}

:root[data-size="standard"] body,
:root[data-size="comfortable"] body,
:root[data-size="large"] body {
  padding-bottom: calc(66px + var(--safe-bottom)) !important;
}

body::before {
  content: "";
  position: fixed;
  left: 0;
  right: 0;
  bottom: -80px;
  height: 160px;
  background: linear-gradient(180deg, var(--theme-bg2), var(--theme-bg2)) !important;
  z-index: -2;
  pointer-events: none;
}

@supports not (height: 100svh) {
  .app {
    min-height: calc(100vh - 56px - var(--safe-bottom)) !important;
  }

  :root[data-size="compact"] .app {
    min-height: calc(100vh - 44px - var(--safe-bottom)) !important;
  }
}


/* v2.3.0 Welcome */
.tj-toast {

/* Keep all scrolling inside the app viewport so content never slides under the iPhone status bar. */
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}
body {
  padding-bottom: 0 !important;
}
.app {
  height: 100dvh;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
  padding-top: calc(10px + max(var(--safe-top), 0px)) !important;
  padding-bottom: 0 !important;
  scroll-padding-top: calc(10px + max(var(--safe-top), 0px));
  scroll-padding-bottom: calc(128px + max(var(--safe-bottom), 0px));
}

/* A real final scroll item prevents iOS rubber-banding from hiding the last row.
   This applies to Settings, Help, version pages and future long task lists. */
.app::after {
  content: "";
  display: block;
  width: 100%;
  height: calc(132px + max(var(--safe-bottom), 0px));
  min-height: calc(132px + max(var(--safe-bottom), 0px));
  pointer-events: none;
  visibility: hidden;
}

  <div id="app" class="app"></div>

  <nav class="tabbar">

  </nav>

  <input id="taskImportFile" type="file" accept="application/json" hidden />

  <script>
const APP_NAME = "Pace Within";
const TJ_STORAGE_KEY = "tally-journal-v2";
const TJ_TASKS_LEGACY_STORAGE_KEY = "telly-tasks-v1";
const TJ_VERSION = "1.1.0-beta.4";
const TJ_RELEASE = "Toetsenbord blijft dicht";
const TJ_BUILD = "20260720-PW09";
const TJ_CONTACT_EMAIL = "my.telly.journal@gmail.com";
const TJ_STATUS = "Beta";

function loadState() {
  let loaded = null;
  try {
    const candidate = JSON.parse(localStorage.getItem(TJ_STORAGE_KEY));
    if (candidate && typeof candidate === "object") loaded = candidate;
  } catch {}

  if (!loaded) {
    loaded = {
      version: TJ_VERSION,
      counters: [],
      tasks: [],
      deletedCounters: [],
      settings: {
        language: "auto",
        theme: "midnight-gold",
        interfaceSize: "standard",
        pinEnabled: false,
        pinHash: "",
        lockOnOpen: true,
        onboardingCompleted: false
      }
    };
  }

  if (!Array.isArray(loaded.counters)) loaded.counters = [];
  if (!Array.isArray(loaded.tasks)) loaded.tasks = [];
  if (!Array.isArray(loaded.deletedCounters)) loaded.deletedCounters = [];

  // One-time, non-destructive migration from the standalone Pace Within Tasks test app.
  if (!loaded.tasks.length) {
    try {
      const legacy = JSON.parse(localStorage.getItem(TJ_TASKS_LEGACY_STORAGE_KEY));
      if (legacy && Array.isArray(legacy.tasks) && legacy.tasks.length) {
        loaded.tasks = legacy.tasks;
        loaded.settings = { ...(legacy.settings || {}), ...(loaded.settings || {}) };
        loaded.settings.tasksMigratedAt = new Date().toISOString();
      }
    } catch {}
  }

  return loaded;
}

function saveState(state, markDataChange = true) {
  state.version = TJ_VERSION;
  state.settings = state.settings || {};

  if (markDataChange) {
    state.settings.lastDataChangeAt = new Date().toISOString();
  }

  localStorage.setItem(TJ_STORAGE_KEY, JSON.stringify(state));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}


function exportJson(state) {
  const now = new Date();
  const filename = `Backup-Pace-Within-${fileTimestamp(now)}.json`;
  const backup = {
    version: TJ_VERSION,
    release: TJ_RELEASE,
    build: TJ_BUILD,
    appName: APP_NAME,
    exportedAt: now.toISOString(),
    dataModelVersion: 2,
    counters: state.counters || [],
    deletedCounters: state.deletedCounters || [],
    tasks: state.tasks || [],
    settings: state.settings || {}
  };
  downloadBlob(new Blob([JSON.stringify(backup, null, 2)], { type:"application/json" }), filename);
  state.settings.lastBackupAt = now.toISOString();
  state.settings.lastDataChangeAt = state.settings.lastBackupAt;
  saveState(state, false);
  showToast(currentLanguage()==="nl" ? "Volledige back-up gemaakt" : "Full backup created");
  if (screen === "settings") renderSettings();
}

function exportTasksJson() {
  const now = new Date();
  const backup = {
    version: TJ_VERSION,
    release: TJ_RELEASE,
    build: TJ_BUILD,
    appName: APP_NAME,
    exportedAt: now.toISOString(),
    dataModelVersion: 2,
    tasks: state.tasks || []
  };
  downloadBlob(
    new Blob([JSON.stringify(backup, null, 2)], { type:"application/json" }),
    `Backup-Pace-Within-Tasks-${fileTimestamp(now)}.json`
  );
  showToast(currentLanguage()==="nl" ? "Takenback-up gemaakt" : "Tasks backup created");
}

function importFullJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const nl = currentLanguage() === "nl";
    try {
      const data = JSON.parse(reader.result);
      const hasCounters = Array.isArray(data?.counters);
      const hasTasks = Array.isArray(data?.tasks);
      if (!hasCounters && !hasTasks) throw new Error("No supported app data");

      const dialog = document.createElement("dialog");
      dialog.className = "task-dialog";
      dialog.innerHTML = `<div class="modal task-dialog-menu import-choice">
        <div class="eyebrow">${nl ? "Volledige back-up importeren" : "Import full backup"}</div>
        <h2>${nl ? "Wat wil je herstellen?" : "How should this be restored?"}</h2>
        <p class="help-copy">${nl
          ? "Deze keuze kan Counters, Logboek, Taken en algemene instellingen beïnvloeden."
          : "This choice can affect Counters, Journal, Tasks and general settings."}</p>
        <button class="choice-btn" id="mergeFull"><strong>${nl ? "Samenvoegen waar mogelijk" : "Merge where possible"}</strong><span>${nl
          ? "Bestaande gegevens blijven staan. Nieuwe Counters en Taken worden toegevoegd."
          : "Existing data stays. New Counters and Tasks are added."}</span></button>
        <button class="choice-btn" id="replaceFull"><strong>${nl ? "Alle appgegevens vervangen" : "Replace all app data"}</strong><span>${nl
          ? "Counters, Logboek, Taken en instellingen worden vervangen door deze back-up."
          : "Counters, Journal, Tasks and settings are replaced by this backup."}</span></button>
        <button onclick="this.closest('dialog').remove()">${nl ? "Annuleren" : "Cancel"}</button>
      </div>`;

      dialog.querySelector("#mergeFull").onclick = () => {
        if (hasCounters) {
          const ids = new Set((state.counters || []).map(item => item.id));
          data.counters.map(normalizeCounter).forEach(item => {
            if (ids.has(item.id)) item.id = uid();
            ids.add(item.id);
            state.counters.push(item);
          });
        }
        if (hasTasks) {
          const ids = new Set((state.tasks || []).map(item => item.id));
          data.tasks.map(normalizeTask).forEach(item => {
            if (ids.has(item.id)) item.id = uid();
            ids.add(item.id);
            state.tasks.push(item);
          });
        }
        saveState(state);
        dialog.remove();
        render();
        alert(nl ? "Back-up samengevoegd." : "Backup merged.");
      };

      dialog.querySelector("#replaceFull").onclick = () => {
        if (!confirm(nl
          ? "Alle huidige appgegevens vervangen door deze back-up?"
          : "Replace all current app data with this backup?")) return;
        state.counters = hasCounters ? data.counters.map(normalizeCounter) : [];
        state.deletedCounters = Array.isArray(data.deletedCounters) ? data.deletedCounters.map(normalizeCounter) : [];
        state.tasks = hasTasks ? data.tasks.map(normalizeTask) : [];
        state.settings = { ...(state.settings || {}), ...(data.settings || {}) };
        saveState(state, false);
        dialog.remove();
        applyAppearance();
        render();
        alert(nl ? "Alle appgegevens zijn vervangen." : "All app data was replaced.");
      };

      document.body.appendChild(dialog);
      dialog.showModal();
  keepDialogKeyboardClosed(dialog);
    } catch (error) {
      console.error(error);
      alert(nl
        ? "Importeren mislukt. Dit is geen leesbare volledige Pace Within-back-up."
        : "Import failed. This is not a readable full Pace Within backup.");
    }
  };
  reader.readAsText(file);
}


function exportCsv(counters) {
  const rows = [["Counter", "Status", "Emoji", "Date and Time", "Note"]];
  counters.forEach(counter => {
    (counter.entries || []).forEach(entry => {
      rows.push([
        counter.name,
        counter.archived ? "Archived" : "Active",
        counter.emoji || "",
        formatDate(entry.dateTime),
        entry.note || ""
      ]);
    });
  });

  const csv = rows.map(row => row.map(v => `"${String(v).replaceAll('"', '""')}"`).join(";")).join("\n");
  downloadBlob(new Blob([csv], { type: "text/csv;charset=utf-8" }), `Export-TJ-${fileTimestamp(new Date())}.csv`);
}

function fileTimestamp(date = new Date()) {
  const pad = value => String(value).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}`;
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function importJsonFile(file, state, onDone) {
  const reader = new FileReader();

  reader.onload = () => {
    const nl = currentLanguage() === "nl";
    try {
      const data = JSON.parse(reader.result);
      const looksLikeTaskArray = Array.isArray(data) && data.every(item => item && typeof item === "object" && ("title" in item || "bucket" in item));
      const importedTasks = looksLikeTaskArray ? data : data?.tasks;

      if (!Array.isArray(importedTasks)) throw new Error("No tasks found");

      const tasks = importedTasks.map(normalizeTask).filter(task => task.title);
      if (!tasks.length && importedTasks.length) throw new Error("No readable tasks");

      openImportChoiceDialog(tasks, state, onDone);
    } catch (error) {
      console.error(error);
      alert(nl ? "Importeren mislukt. In dit bestand zijn geen leesbare takengegevens gevonden." : "Import failed. No readable task data was found in this file.");
    }
  };

  reader.onerror = () => {
    const nl = currentLanguage() === "nl";
    alert(nl ? "Het bestand kon niet worden gelezen." : "The file could not be read.");
  };

  reader.readAsText(file);
}

function openImportChoiceDialog(tasks, state, onDone) {
  const nl = currentLanguage() === "nl";
  const dialog = document.createElement("dialog");
  dialog.className = "task-dialog";
  dialog.innerHTML = `<div class="modal task-dialog-menu import-choice">
    <div class="eyebrow">${nl ? "Back-up importeren" : "Import backup"}</div>
    <h2>${tasks.length} ${tasks.length === 1 ? (nl ? "taak gevonden" : "task found") : (nl ? "taken gevonden" : "tasks found")}</h2>
    <p class="help-copy">${nl ? "Kies wat er met je huidige taken moet gebeuren." : "Choose what should happen to your current tasks."}</p>
    <button class="choice-btn" onclick="applyTaskImport('add', this.closest('dialog'))"><strong>${nl ? "Toevoegen aan huidige taken" : "Add to current tasks"}</strong><span>${nl ? "Je huidige taken blijven staan. De taken uit de back-up worden erbij gezet." : "Your current tasks stay. Tasks from the backup are added."}</span></button>
    <button class="choice-btn" onclick="applyTaskImport('replace', this.closest('dialog'))"><strong>${nl ? "Huidige taken vervangen" : "Replace current tasks"}</strong><span>${nl ? "Alle huidige taken worden verwijderd en vervangen door de taken uit deze back-up." : "All current tasks are removed and replaced by the tasks in this backup."}</span></button>
    <button onclick="this.closest('dialog').remove()">${nl ? "Annuleren" : "Cancel"}</button>
  </div>`;
  dialog._importTasks = tasks;
  dialog._importState = state;
  dialog._onDone = onDone;
  document.body.appendChild(dialog);
  dialog.showModal();
  keepDialogKeyboardClosed(dialog);
}

function applyTaskImport(mode, dialog) {
  const nl = currentLanguage() === "nl";
  const tasks = dialog?._importTasks || [];
  const targetState = dialog?._importState || state;
  if (!Array.isArray(tasks)) return;

  if (mode === "replace") {
    if (!confirm(nl
      ? "Alle huidige taken verwijderen en vervangen door deze back-up?"
      : "Remove all current tasks and replace them with this backup?")) return;
    targetState.tasks = tasks.map(normalizeTask);
  } else {
    targetState.tasks = Array.isArray(targetState.tasks) ? targetState.tasks : [];
    const ids = new Set(targetState.tasks.map(task => task.id));
    tasks.forEach(sourceTask => {
      const task = normalizeTask(sourceTask);
      if (ids.has(task.id)) task.id = uid();
      ids.add(task.id);
      targetState.tasks.push(task);
    });
  }

  targetState.settings = targetState.settings || {};
  targetState.settings.lastDataChangeAt = new Date().toISOString();
  saveState(targetState, false);
  dialog?.remove();
  alert(nl
    ? `${tasks.length} ${tasks.length === 1 ? "taak geïmporteerd" : "taken geïmporteerd"}.`
    : `${tasks.length} ${tasks.length === 1 ? "task imported" : "tasks imported"}.`);
  if (typeof dialog?._onDone === "function") dialog._onDone();
}

function normalizeCounter(counter) {
  return {
    id: counter.id || uid(),
    name: counter.name || "Imported Counter",
    emoji: counter.emoji || "📌",
    color: counter.color || "#d7b56d",
    archived: !!counter.archived,
    showDaysBetweenEntries: !!counter.showDaysBetweenEntries,
    createdAt: counter.createdAt || new Date().toISOString(),
    entries: (counter.entries || []).map(entry => ({
      id: entry.id || uid(),
      dateTime: entry.dateTime || new Date().toISOString(),
      note: entry.note || ""
    })).sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime))
  };
}


const app = document.getElementById("app");
const importFile = document.getElementById("importFile");

let state = loadState();
state.settings = state.settings || {};
if (typeof state.settings.pinEnabled !== "boolean") state.settings.pinEnabled = false;
if (typeof state.settings.pinHash !== "string") state.settings.pinHash = "";
if (typeof state.settings.lockOnOpen !== "boolean") state.settings.lockOnOpen = true;
if (!state.settings.theme) state.settings.theme = "midnight-gold";
if (!state.settings.interfaceSize) state.settings.interfaceSize = "standard";
if (typeof state.settings.onboardingCompleted !== "boolean") state.settings.onboardingCompleted = false;
if (typeof state.settings.lastSeenVersion !== "string") state.settings.lastSeenVersion = "";
if (typeof state.settings.lastBackupAt !== "string") state.settings.lastBackupAt = "";
if (typeof state.settings.lastDataChangeAt !== "string") state.settings.lastDataChangeAt = "";
if (typeof state.settings.backupReminderDismissedAt !== "string") state.settings.backupReminderDismissedAt = "";
if (!Array.isArray(state.deletedCounters)) state.deletedCounters = [];
if (!Array.isArray(state.tasks)) state.tasks = [];
if (typeof state.settings.autoUpdateCheck !== "boolean") state.settings.autoUpdateCheck = true;
if (typeof state.settings.lastUpdateCheckAt !== "string") state.settings.lastUpdateCheckAt = "";
if (typeof state.settings.dismissedUpdateBuild !== "string") state.settings.dismissedUpdateBuild = "";
if (typeof state.settings.lastSeenReleaseBuild !== "string") state.settings.lastSeenReleaseBuild = "";
if (!["auto","en","nl"].includes(state.settings.language)) state.settings.language = "auto";
saveState(state, false);

function applyAppearance() {
  document.documentElement.setAttribute("data-theme", state.settings.theme || "midnight-gold");
  document.documentElement.setAttribute("data-size", state.settings.interfaceSize || "standard");
}

applyAppearance();

let locked = !!state.settings.pinEnabled;
let screen = "home";
let helpArticle = null;
let startupChecksCompleted = false;
let settingsScrollY = 0;
let helpCenterScrollY = 0;

let mode = "active";
let selectedCounterId = null;
let selectedColor = "#d7b56d";

const colors = ["#d7b56d", "#6ea8ff", "#61d394", "#ff8fab", "#c084fc", "#fb923c", "#22d3ee", "#a3e635", "#f87171", "#facc15", "#94a3b8", "#f5f7fb"];

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    screen = btn.dataset.screen;
    selectedCounterId = null;
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

importFile.addEventListener("change", event => {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file) return;
  importFullJsonFile(file);
});

const taskImportFile = document.getElementById("taskImportFile");
taskImportFile.addEventListener("change", event => {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file) return;
  importJsonFile(file, state, render);
});



let swipeStartX = 0;
let swipeStartY = 0;
let swipeTracking = false;

function canSwipeBack() {
  if (document.querySelector("dialog[open]")) return false;
  if (screen === "help") return true;
  if (selectedCounterId) return true;
  return ["deleted", "version", "history", "feedback", "support"].includes(screen);
}

function handleSwipeBack() {
  if (screen === "help" && helpArticle) return returnToHelpCenter();
  if (screen === "help" && !helpArticle) return returnToSettings();
  if (selectedCounterId) {
    selectedCounterId = null;
    screen = "home";
    document.querySelectorAll(".tab").forEach(button => button.classList.toggle("active", button.dataset.screen === "home"));
    return render();
  }
  if (screen === "history") return renderVersionPage();
  if (["deleted", "version", "feedback", "support"].includes(screen)) return returnToSettings();
}

document.addEventListener("touchstart", event => {
  if (!canSwipeBack() || event.touches.length !== 1) return;
  const touch = event.touches[0];
  if (touch.clientX > 32) return;
  swipeStartX = touch.clientX;
  swipeStartY = touch.clientY;
  swipeTracking = true;
}, { passive: true });

document.addEventListener("touchend", event => {
  if (!swipeTracking || event.changedTouches.length !== 1) return;
  swipeTracking = false;
  const touch = event.changedTouches[0];
  const deltaX = touch.clientX - swipeStartX;
  const deltaY = touch.clientY - swipeStartY;
  if (deltaX >= 85 && Math.abs(deltaY) <= 55 && deltaX > Math.abs(deltaY) * 1.5) {
    handleSwipeBack();
  }
}, { passive: true });

document.addEventListener("touchcancel", () => {
  swipeTracking = false;
}, { passive: true });

function hashPin(pin) {
  let hash = 0;
  const text = "tj:" + String(pin);
  for (let i = 0; i < text.length; i++) {
    hash = ((hash << 5) - hash) + text.charCodeAt(i);
    hash |= 0;
  }
  return String(hash);
}

function showLockScreen() {
  app.innerHTML = `
    <div class="header">
      <div>
        <div class="eyebrow">Private journal locked</div>
        <h1>Pace Within</h1>
        <div class="subtitle">Enter your PIN to unlock your journal.</div>
      </div>
    </div>

    <div class="detail-card">
      <label>PIN Code</label>
      <input id="unlockPin" type="password" inputmode="numeric" maxlength="12" placeholder="Enter PIN" />
      <div class="actions" style="margin-top:10px">
        <button class="wide primary" onclick="unlockApp()">Unlock</button>
      </div>
      <p class="subtitle" style="margin-top:10px">If you forget your PIN, your local app data cannot be unlocked from this screen. Keep a JSON backup somewhere safe.</p>
    </div>
  `;
  setTimeout(() => document.getElementById("unlockPin")?.focus(), 100);
}

function unlockApp() {
  const pin = document.getElementById("unlockPin")?.value || "";
  if (hashPin(pin) === state.settings.pinHash) {
    locked = false;
    render();
  } else {
    alert("Incorrect PIN.");
  }
}

function setPin() {
  const pin1 = prompt("Choose a PIN code. Use at least 4 digits.");
  if (pin1 === null) return;
  if (!/^\d{4,12}$/.test(pin1)) {
    alert("PIN must be 4 to 12 digits.");
    return;
  }

  const pin2 = prompt("Repeat your PIN code.");
  if (pin2 === null) return;

  if (pin1 !== pin2) {
    alert("PIN codes do not match.");
    return;
  }

  state.settings.pinEnabled = true;
  state.settings.pinHash = hashPin(pin1);
  state.settings.lockOnOpen = true;
  saveState(state);
  alert("PIN enabled.");
  render();
}

function changePin() {
  const oldPin = prompt("Enter current PIN.");
  if (oldPin === null) return;
  if (hashPin(oldPin) !== state.settings.pinHash) {
    alert("Incorrect PIN.");
    return;
  }

  const pin1 = prompt("Choose a new PIN code. Use at least 4 digits.");
  if (pin1 === null) return;
  if (!/^\d{4,12}$/.test(pin1)) {
    alert("PIN must be 4 to 12 digits.");
    return;
  }

  const pin2 = prompt("Repeat your new PIN code.");
  if (pin2 === null) return;
  if (pin1 !== pin2) {
    alert("PIN codes do not match.");
    return;
  }

  state.settings.pinHash = hashPin(pin1);
  saveState(state);
  alert("PIN changed.");
  render();
}

function disablePin() {
  const pin = prompt("Enter current PIN to disable access control.");
  if (pin === null) return;
  if (hashPin(pin) !== state.settings.pinHash) {
    alert("Incorrect PIN.");
    return;
  }

  if (!confirm("Disable PIN protection?")) return;
  state.settings.pinEnabled = false;
  state.settings.pinHash = "";
  saveState(state);
  alert("PIN disabled.");
  render();
}

function lockNow() {
  if (!state.settings.pinEnabled) return;
  locked = true;
  showLockScreen();
}

function updateAppCache() {
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations().then(registrations => {
      registrations.forEach(registration => registration.unregister());
      if ("caches" in window) {
        caches.keys().then(keys => Promise.all(keys.map(key => caches.delete(key)))).then(() => {
          alert("App cache cleared. Close and reopen the app.");
        });
      } else {
        alert("Service worker cleared. Close and reopen the app.");
      }
    });
  } else {
    alert("No app cache found.");
  }
}




function versionUrl() {
  const url = new URL(window.location.href);
  url.searchParams.set("build", TJ_BUILD);
  url.searchParams.set("_", Date.now().toString());
  return url.toString();
}

async function checkForUpdates(manual = false) {
  try {
    state.settings.lastUpdateCheckAt = new Date().toISOString();
    saveState(state, false);
    const response = await fetch(`index.html?update-check=${Date.now()}`, { cache: "no-store" });
    if (!response.ok) throw new Error("Update check failed");
    const text = await response.text();
    const versionMatch = text.match(/const TJ_VERSION = "([^"]+)"/);
    const buildMatch = text.match(/const TJ_BUILD = "([^"]+)"/);
    const remoteVersion = versionMatch ? versionMatch[1] : "";
    const remoteBuild = buildMatch ? buildMatch[1] : "";
    if (remoteBuild && remoteBuild !== TJ_BUILD) showUpdateDialog(remoteVersion || "New version", remoteBuild);
    else if (manual) showToast("You are up to date");
  } catch (error) {
    if (manual) alert("Update check failed. Please try again later.");
  }
}

function showUpdateDialog(version, build) {
  const dialog = document.createElement("dialog");
  dialog.className = "tj-update-dialog";
  const nl = currentLanguage() === "nl";
  dialog.innerHTML = `<div class="modal"><span data-dialog-focus-anchor tabindex="-1" aria-hidden="true"></span><div class="help-hero-icon">🎉</div><h2>${nl ? "Update beschikbaar" : "Update available"}</h2><p class="help-copy">${nl ? "Er staat een nieuwere versie van Pace Within Tasks klaar." : "A newer Pace Within Tasks build is available."}</p><div class="info-card"><span>${nl ? "Versie" : "Version"}</span><strong>${version}</strong></div><div class="info-card"><span>Build</span><strong>${build}</strong></div><div class="modal-actions stacked-actions"><button class="primary" onclick="installLatestUpdate()">${nl ? "Nu bijwerken" : "Update now"}</button><button onclick="dismissUpdate('${build}', this.closest('dialog'))">${nl ? "Later" : "Later"}</button></div></div>`;
  document.body.appendChild(dialog); dialog.showModal();
}


function dismissUpdate(build, dialog) {
  state.settings.dismissedUpdateBuild = build;
  saveState(state, false);
  dialog.remove();
  showToast("Update postponed");
}

async function installLatestUpdate() {
  state.settings.dismissedUpdateBuild = "";
  saveState(state, false);

  try {
    const regs = await navigator.serviceWorker?.getRegistrations?.() || [];
    await Promise.all(regs.map(r => r.unregister()));
    if ("caches" in window) { const keys = await caches.keys(); await Promise.all(keys.map(k => caches.delete(k))); }
  } finally { window.location.replace(versionUrl()); }
}

function scheduleAutomaticUpdateCheck() {
  if (state.settings.autoUpdateCheck) setTimeout(() => checkForUpdates(false), 1200);
}

function showToast(message) {
  const existing = document.querySelector(".tj-toast");
  if (existing) existing.remove();

  const toast = document.createElement("div");
  toast.className = "tj-toast";
  toast.textContent = message;
  document.body.appendChild(toast);

  requestAnimationFrame(() => toast.classList.add("show"));
  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 220);
  }, 1700);
}

function currentLanguage() {
  const pref = state.settings.language || "auto";
  if (pref === "en" || pref === "nl") return pref;
  return (navigator.language || "en").toLowerCase().startsWith("nl") ? "nl" : "en";
}

function translateString(value) {
  const lang = currentLanguage();
  if (lang !== "nl") return value;

  const trimmed = String(value || "").trim();
  if (I18N.nl[trimmed]) return I18N.nl[trimmed];

  let match = trimmed.match(/^(\d+)\s+days since last entry$/i);
  if (match) return `${match[1]} dagen sinds het laatste item`;

  match = trimmed.match(/^1 day since last entry$/i);
  if (match) return "1 dag sinds het laatste item";

  match = trimmed.match(/^(\d+)\s+days later$/i);
  if (match) return `${match[1]} dagen later`;

  match = trimmed.match(/^1 day later$/i);
  if (match) return "1 dag later";

  match = trimmed.match(/^(\d+)\s+items$/i);
  if (match) return `${match[1]} items`;

  match = trimmed.match(/^(\d+)\s+entries$/i);
  if (match) return `${match[1]} items`;

  match = trimmed.match(/^(\d+)\s+item$/i);
  if (match) return `${match[1]} item`;

  match = trimmed.match(/^(\d+)\s+entry$/i);
  if (match) return `${match[1]} item`;

  match = trimmed.match(/^Version\s+(.+)$/i);
  if (match) return `Versie ${match[1]}`;

  return value;
}

function applyTranslations(root = document) {
  const lang = currentLanguage();
  document.documentElement.lang = lang;

  root.querySelectorAll("input[placeholder], textarea[placeholder]").forEach(el => {
    el.placeholder = translateString(el.placeholder);
  });

  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);

  nodes.forEach(node => {
    const parent = node.parentElement;
    if (!parent || ["SCRIPT","STYLE"].includes(parent.tagName)) return;

    const original = node.nodeValue;
    const trimmed = original.trim();
    if (!trimmed) return;

    const translated = translateString(trimmed);
    if (translated !== trimmed) {
      node.nodeValue = original.replace(trimmed, translated);
    }
  });
}

});

function formatFriendlyDate(value) {
  if (!value) return "Never";
  return new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", {
    dateStyle: "medium",
    timeStyle: "short"
  }).format(new Date(value));
}

function sameCalendarDay(a, b) {
  if (!a || !b) return false;
  return new Date(a).toDateString() === new Date(b).toDateString();
}

function hasUnbackedChanges() {
  const changed = state.settings.lastDataChangeAt;
  const backedUp = state.settings.lastBackupAt;

  if (!changed) return false;
  if (!backedUp) return state.counters.some(counter => (counter.entries || []).length > 0);
  return new Date(changed) > new Date(backedUp);
}

function runStartupChecks() {
  if (startupChecksCompleted || locked || !state.settings.onboardingCompleted) return;
  startupChecksCompleted = true;

  const dismissedToday = sameCalendarDay(
    state.settings.backupReminderDismissedAt,
    new Date().toISOString()
  );

  if (hasUnbackedChanges() && !dismissedToday) {
    setTimeout(showBackupReminder, 450);
  }
}

function showOnboarding(step = 0) {
  const nl = currentLanguage() === "nl";
  const pages = nl ? [
    { icon:"👋", title:"Welkom bij Pace Within", body:"Eén rustige plek voor Counters, Taken en je chronologische Logboek. Alles werkt lokaal op je eigen toestel." },
    { icon:"🔢", title:"Houd bij met Counters", body:"Maak een counter voor wat jij wilt volgen. Iedere invoer krijgt een datum en tijd en kan een korte notitie bevatten." },
    { icon:"☷", title:"Bekijk het terug in je Logboek", body:"Je Logboek brengt de registraties van je actieve counters samen in één chronologische tijdlijn." },
    { icon:"✓", title:"Organiseer met Taken", body:"Verdeel taken over Vandaag, Later en Wachten op. Voeg deadlines, opvolgdatums en subtaken toe." },
    { icon:"🧩", title:"Maak de volgende stap klein", body:"Gebruik subtaken en voortgang. Met Help mij op weg beantwoord je vijf korte vragen en maak je een taak concreter." },
    { icon:"💾", title:"Maak regelmatig een back-up", body:"Exporteer de hele app in één bestand of alleen je taken. Bestaande losse Pace Within Tasks-back-ups blijven importeerbaar." },
    { icon:"🎨", title:"Maak de app van jou", body:"Kies je taal, thema, tekstgrootte en eventueel een pincode. Deze instellingen gelden voor de hele app.", disclaimer:"Pace Within is een praktisch hulpmiddel voor overzicht en zelfreflectie. De app vervangt geen professionele begeleiding, behandeling of medisch advies." }
  ] : [
    { icon:"👋", title:"Welcome to Pace Within", body:"One calm place for Counters, Tasks and your chronological Journal. Everything stays locally on your device." },
    { icon:"🔢", title:"Track with Counters", body:"Create a counter for anything you want to follow. Every entry receives a date and time and can include a short note." },
    { icon:"☷", title:"Review it in your Journal", body:"Your Journal combines entries from active counters into one chronological timeline." },
    { icon:"✓", title:"Organise with Tasks", body:"Sort tasks into Today, Later and Waiting on. Add deadlines, follow-up dates and subtasks." },
    { icon:"🧩", title:"Make the next step small", body:"Use subtasks and progress. Help me get started uses five short questions to make a task clearer and more actionable." },
    { icon:"💾", title:"Create regular backups", body:"Export the whole app in one file or only your tasks. Existing standalone Pace Within Tasks backups remain importable." },
    { icon:"🎨", title:"Make the app yours", body:"Choose your language, theme, interface size and optional PIN. These settings apply to the whole app.", disclaimer:"Pace Within is a practical tool for organisation and self-reflection. It does not replace professional guidance, treatment or medical advice." }
  ];

  const page = pages[Math.min(step, pages.length - 1)];
  const dialog = document.createElement("dialog");
  dialog.className = "tj-onboarding";
  dialog.innerHTML = `
    <div class="modal onboarding-card">
      <div class="onboarding-progress">${pages.map((_, i) => `<span class="${i === step ? "active" : ""}"></span>`).join("")}</div>
      <div class="onboarding-icon">${page.icon}</div>
      <h2>${page.title}</h2>
      <p>${page.body}</p>
      ${page.disclaimer ? `<div class="onboarding-disclaimer"><strong>${nl?"Goed om te weten":"Good to know"}</strong><br>${page.disclaimer}<br><small>${nl?"Meer informatie vind je in Hulp & Tips bij Professionele hulp en beperkingen.":"More information is available in Help & Tips under Professional help and limitations."}</small></div>` : ""}
      <div class="modal-actions stacked-actions">
        ${step === pages.length - 1
          ? `<button class="primary" onclick="finishOnboarding(this.closest('dialog'))">${nl ? "Aan de slag" : "Get started"}</button>`
          : `<button class="primary" onclick="nextOnboarding(${step + 1}, this.closest('dialog'))">${nl ? "Doorgaan" : "Continue"}</button>`}
      </div>
    </div>`;
  document.body.appendChild(dialog);
  dialog.showModal();
}
function nextOnboarding(step, dialog) {
  dialog.remove();
  showOnboarding(step);
}

function finishOnboarding(dialog) {
  state.settings.onboardingCompleted = true;
  state.settings.lastSeenVersion = TJ_VERSION;
  saveState(state, false);
  dialog.remove();
  render();
  setTimeout(runStartupChecks, 350);
}

function replayOnboarding() {
  showOnboarding(0);
}

function openContact(type) {
  const nl = currentLanguage() === "nl";
  const subjects = nl ? {
    feedback: "Pace Within - Algemene feedback",
    bug: "Pace Within - Foutmelding",
    feature: "Pace Within - Functievoorstel",
    question: "Pace Within - Vraag"
  } : {
    feedback: "Pace Within Feedback",
    bug: "Pace Within Bug Report",
    feature: "Pace Within Feature Request",
    question: "Pace Within Question"
  };

  const prompts = nl ? {
    feedback: "Deel hieronder jouw feedback:",
    bug: "Wat gebeurde er en wat verwachtte je?",
    feature: "Beschrijf hieronder jouw idee:",
    question: "Stel hieronder jouw vraag:"
  } : {
    feedback: "Please share your feedback below:",
    bug: "What happened? What did you expect to happen?",
    feature: "Please describe your idea below:",
    question: "Please write your question below:"
  };

  const subject = `${subjects[type]} - v${TJ_VERSION} - Build ${TJ_BUILD}`;
  const body = `${prompts[type]}

${nl ? "Appversie" : "App version"}: ${TJ_VERSION}
Release: ${TJ_RELEASE}
Build: ${TJ_BUILD}
${nl ? "Thema" : "Theme"}: ${themeLabel(state.settings.theme)}
${nl ? "Weergavegrootte" : "Interface size"}: ${sizeLabel(state.settings.interfaceSize)}
Platform: ${navigator.platform || "Unknown"}

`;

  window.location.href = `mailto:${TJ_CONTACT_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

const HELP_ARTICLES = {"welcome":{"icon": "👋", "title": "Welcome", "subtitle": "One calm place for tracking, reflection and planning", "body": "<p>Welcome to Pace Within. The app combines Counters, a Journal and Tasks in one calm environment.</p><p><strong>New name:</strong> the earlier Journal and Tasks functionality now comes together in Pace Within. Existing data and supported backups remain available.</p><p>Use Counters to record recurring events, the Journal to review them in time order, and Tasks to make work smaller and clearer.</p><p>You do not need to use everything. Start with the part that helps today. Data is stored locally and no account is required.</p>"},"what":{"icon": "📖", "title": "How Pace Within works", "subtitle": "Three modules that work separately and together", "body": "<p><strong>Counters</strong> record events with date, time and optional notes. The <strong>Journal</strong> combines active Counter entries chronologically. <strong>Tasks</strong> help plan, split and clarify work.</p><p>There is no mandatory method. The app supports your way of working without adding unnecessary pressure.</p>"},"counters":{"icon": "🔢", "title": "Counters", "subtitle": "For events you want to record more than once", "body": "<p>Use a Counter for recurring events such as exercise, symptoms, medication, contact moments, habits or completed work.</p><p>Each entry receives a date and time. Add notes for useful context, or enter an older event afterwards.</p><p>Choose a name, emoji and colour, and optionally show days since the latest entry or between entries.</p>"},"journal":{"icon": "📓", "title": "Journal", "subtitle": "All active entries in one timeline", "body": "<p>The Journal combines entries from active Counters in chronological order. It can help you see sequence and possible connections between events.</p><p>It does not interpret data or provide a diagnosis. Discuss health-related patterns with a qualified professional.</p>"},"tasks":{"icon": "✅", "title": "Tasks", "subtitle": "Turn an open thought into a clear action", "body": "<p>Tasks can include subtasks, dates, deadlines, follow-up dates and guided outcomes.</p><p>Place them in Today, Later or Waiting on. Edit, move, complete, restore or remove them whenever needed.</p>"},"buckets":{"icon": "📅", "title": "Today, Later and Waiting on", "subtitle": "Each list has a different purpose", "body": "<h3>Today</h3><p>Tasks receiving deliberate attention today.</p><h3>Later</h3><p>Important tasks that are not due today. Add a deadline when useful.</p><h3>Waiting on</h3><p>Tasks depending on another person, reply, delivery or event. Add a follow-up date when possible.</p>"},"subtasks":{"icon": "🪜", "title": "Subtasks and progress", "subtitle": "Make a task small enough to start", "body": "<p>Subtasks turn large or vague work into concrete actions. Mark one open subtask as the next step.</p><p>Progress is calculated from completed subtasks and is a visual aid, not a judgement.</p>"},"guidance":{"icon": "🧭", "title": "Help me get started", "subtitle": "Five fixed questions to clarify a task", "body": "<p>The guided flow explores necessity, responsibility, clarity, timing and the type of action required.</p><p>It may suggest doing, postponing, delegating, asking for help, clarifying, preparing or splitting the task.</p><p>It uses fixed rules, not artificial intelligence, and does not provide professional advice.</p>"},"adhd":{"icon": "🧠", "title": "ADHD as inspiration", "subtitle": "Reduce reliance on working memory and motivation", "body": "<p>Pace Within was partly inspired by experiences with ADHD, including difficulty starting, prioritising, estimating time and holding information in working memory.</p><p>The app does not diagnose or treat ADHD. Use only the parts that reduce pressure for you.</p>"},"everyone":{"icon": "🌍", "title": "For everyone", "subtitle": "No diagnosis or fixed method required", "body": "<p>Pace Within is for anyone who wants to record events, review patterns or make tasks clearer. Use one module or combine them.</p>"},"features":{"icon": "✨", "title": "All features", "subtitle": "A current overview", "body": "<h3>Counters</h3><ul><li>Create, edit, duplicate and archive</li><li>Dated entries and notes</li><li>Timeline insights</li></ul><h3>Journal</h3><ul><li>Chronological active entries</li></ul><h3>Tasks</h3><ul><li>Today, Later and Waiting on</li><li>Subtasks, progress, dates and guided flow</li></ul><h3>General</h3><ul><li>Languages, themes, PIN, backups and offline use</li></ul>"},"timelineInsights":{"icon": "📆", "title": "Timeline insights", "subtitle": "See time between entries without forcing conclusions", "body": "<p>Show days since the latest entry and days between entries. These numbers describe time only and do not explain causes or provide a diagnosis.</p>"},"gettingStarted":{"icon": "🚀", "title": "Getting started", "subtitle": "Start small and expand only when useful", "body": "<p>Create one Counter or one Task. Keep names clear, add context only when useful and choose one next step.</p><p>A simple system you actually use is better than a complex system that creates pressure.</p>"},"backup":{"icon": "💾", "title": "Backups and recovery", "subtitle": "Local storage also means keeping your own safe copy", "body": "<p>A full backup includes Counters, entries, Tasks, subtasks, guided outcomes and settings. A task-only backup can be imported separately.</p><p>Replacing data can remove current information, so create a fresh backup first and store it safely outside the app.</p>"},"privacy":{"icon": "🔒", "title": "Privacy and local storage", "subtitle": "You remain in control of your information", "body": "<p>No account is required. Content is stored locally and is not automatically synchronised between devices.</p><p>The PIN prevents casual access in the app but is not full device encryption.</p>"},"professionalHelp":{"icon": "🩺", "title": "Professional help and limitations", "subtitle": "A tool, not diagnosis or treatment", "body": "<p>Pace Within is a personal tool for tracking, reflection and planning. It does not replace a doctor, psychologist, psychiatrist, therapist, legal adviser, financial adviser or other qualified professional.</p><p>For ongoing concerns, medication questions or important decisions, contact an appropriate professional or organisation.</p><p><strong>In an acute or dangerous situation, contact local emergency services or a qualified professional immediately.</strong></p>"},"faq":{"icon": "❓", "title": "Frequently asked questions", "subtitle": "Practical answers", "body": "<p><strong>Where is my data?</strong><br>Locally on this device.</p><p><strong>Do I need an account?</strong><br>No.</p><p><strong>Does it sync automatically?</strong><br>No. Use backups to transfer data.</p><p><strong>Does the guided flow give professional advice?</strong><br>No.</p>"},"feedback":{"icon": "❤️", "title": "Feedback and development", "subtitle": "Practical feedback improves the app", "body": "<p>Report bugs, unclear text, accessibility issues or ideas through Feedback and contact. Avoid sharing sensitive content when it is not required.</p>"},"philosophy":{"icon": "🛡️", "title": "My philosophy", "subtitle": "Calm, control and no unnecessary pressure", "body": "<p>The app avoids streaks, punishment and guilt. A task that remains open is not a moral failure. Privacy, simplicity, calm design and useful small steps guide development.</p>"},"developer":{"icon": "👨‍💻", "title": "About the developer", "subtitle": "A personal project that grew step by step", "body": "<p>Pace Within started as a personal project and gradually grew into a complete app for tracking, overview and making tasks smaller.</p><p>Development focuses on simplicity, privacy, calm mobile design and functions that add practical value.</p><p>It is not a product of a medical, psychological, legal or other professional organisation.</p>"},"roadmap":{"icon": "🗺️", "title": "Roadmap", "subtitle": "Direction for future development", "body": "<h3>Journal</h3><ul><li>Search, filters, exports and recovery</li><li>Accessibility and public release preparation</li></ul><h3>Tasks</h3><ul><li>Sharing, calendar export and gentle reminders</li><li>Stale-task support, bulk actions and focus mode</li></ul><p>The roadmap is a direction, not a fixed promise.</p>"},"updates":{"icon": "🔄", "title": "Updates and offline use", "subtitle": "How versions and local cache work", "body": "<p>Pace Within is a Progressive Web App. Once loaded correctly, its core is designed to remain available offline.</p><p>Updates normally preserve local data, but keeping a current backup remains important.</p>"},"whatsNew":{"icon": "🆕", "title": "What’s New", "subtitle": "Version ${TJ_VERSION}", "body": "<div class=\"release-card current\"><strong>Version ${TJ_VERSION}</strong><span>${TJ_RELEASE} · Build ${TJ_BUILD}</span><ul><li>Every Help and Tips article has been expanded</li><li>Professional help and limitations are clearly explained</li><li>Returning from an article restores the previous list position</li><li>Edge swipe back works on appropriate detail screens</li></ul></div>"}};

const HELP_ARTICLES_NL = {"welcome":{"icon": "👋", "title": "Welkom", "subtitle": "Eén rustige plek voor registratie, overzicht en planning", "body": "<p>Welkom bij Pace Within. De app combineert Counters, een Logboek en Taken in één rustige omgeving.</p><p><strong>Nieuwe naam:</strong> de eerdere Journal- en Taken-functionaliteiten zijn samengebracht in Pace Within. Bestaande gegevens en ondersteunde back-ups blijven behouden.</p>\n<p>Gebruik <strong>Counters</strong> om gebeurtenissen of gewoontes vast te leggen, het <strong>Logboek</strong> om registraties terug te zien en <strong>Taken</strong> om werk kleiner en overzichtelijker te maken.</p>\n<p>Je hoeft niet alles tegelijk te gebruiken. Begin met het onderdeel dat nu het meeste helpt. Alle gegevens worden lokaal op je apparaat opgeslagen en er is geen account nodig.</p>\n<p>In Hulp en tips vind je uitleg, voorbeelden, privacy-informatie, back-upadvies en de grenzen van de app.</p>"},"what":{"icon": "📖", "title": "Zo werkt Pace Within", "subtitle": "Drie onderdelen die apart én samen bruikbaar zijn", "body": "<p>Pace Within bestaat uit drie hoofdonderdelen.</p>\n<h3>Counters</h3><p>Een Counter registreert een gebeurtenis met datum, tijd en eventueel een notitie.</p>\n<h3>Logboek</h3><p>Het Logboek zet registraties van actieve Counters in chronologische volgorde, zodat je kunt terugzien wat er wanneer gebeurde.</p>\n<h3>Taken</h3><p>Taken helpen bij plannen, opdelen en bepalen wat vandaag, later of na een reactie aandacht nodig heeft.</p>\n<p>Er is geen verplichte methode. De app ondersteunt jouw manier van werken en probeert geen extra administratie of druk te creëren.</p>"},"counters":{"icon": "🔢", "title": "Counters", "subtitle": "Voor gebeurtenissen die je vaker wilt registreren", "body": "<p>Gebruik een Counter voor iets dat terugkomt en dat je wilt bijhouden. Denk aan sport, hoofdpijn, medicatie, overprikkeling, contactmomenten, gewoontes of afgeronde werkzaamheden.</p>\n<p>Iedere registratie krijgt automatisch een datum en tijd. Voeg een notitie toe wanneer context nuttig is. Je kunt ook achteraf een registratie met een eerdere datum invoeren.</p>\n<p>Geef iedere Counter een eigen naam, emoji en kleur. Optioneel toon je hoeveel dagen sinds de laatste registratie zijn verstreken en hoeveel dagen tussen registraties zaten.</p>\n<p>Een Counter die je tijdelijk niet gebruikt kun je archiveren. De geschiedenis blijft dan behouden.</p>"},"journal":{"icon": "📓", "title": "Logboek", "subtitle": "Alle actieve registraties in één tijdlijn", "body": "<p>Het Logboek brengt registraties van actieve Counters samen in één chronologische tijdlijn.</p>\n<p>Waar een Counter één onderwerp laat zien, helpt het Logboek om meerdere gebeurtenissen naast elkaar te bekijken. Daardoor kun je mogelijk samenhang of volgorde herkennen.</p>\n<p>Iedere regel toont de Counter, datum, tijd en notitie. Vanuit het Logboek kun je terug naar de bijbehorende Counter.</p>\n<p>Het Logboek trekt geen conclusies en stelt geen diagnose. Gebruik medische of psychologische registraties vooral als ondersteuning bij een gesprek met een deskundige.</p>"},"tasks":{"icon": "✅", "title": "Taken", "subtitle": "Van openstaande gedachte naar duidelijke actie", "body": "<p>Een taak bestaat uit een titel en kan worden aangevuld met subtaken, een datum, deadline, opvolgdatum en een begeleide uitkomst.</p>\n<p>Taken worden verdeeld over <strong>Vandaag</strong>, <strong>Later</strong> en <strong>Wachten op</strong>. Je kunt ze altijd bewerken, verplaatsen, afronden, herstellen of verwijderen.</p>\n<p>Het doel is niet een perfecte planning. Het doel is zichtbaar maken wat aandacht nodig heeft en één haalbare volgende stap kiezen.</p>"},"buckets":{"icon": "📅", "title": "Vandaag, Later en Wachten op", "subtitle": "Iedere lijst heeft een eigen bedoeling", "body": "<h3>Vandaag</h3><p>Voor taken waar je vandaag bewust aandacht aan wilt geven. Houd deze lijst bij voorkeur kort en haalbaar.</p>\n<h3>Later</h3><p>Voor belangrijke taken die niet vandaag hoeven. Voeg eventueel een deadline toe zodat Later geen vergeetlijst wordt.</p>\n<h3>Wachten op</h3><p>Voor zaken waarbij je afhankelijk bent van een antwoord, levering, goedkeuring of actie van iemand anders. Voeg bij voorkeur een opvolgdatum toe.</p>\n<p>De kaart <strong>Nog aandacht nodig</strong> houdt Later en Wachten op zichtbaar vanuit Vandaag.</p>"},"subtasks":{"icon": "🪜", "title": "Subtaken en voortgang", "subtitle": "Maak een grote taak klein genoeg om te beginnen", "body": "<p>Subtaken verdelen een grote of vage taak in concrete handelingen. Zo wordt bijvoorbeeld ‘belasting regelen’ een reeks kleine stappen.</p>\n<p>Je kunt één open subtaak aanwijzen als volgende stap. Daardoor hoef je niet telkens opnieuw te bepalen waar je moet beginnen.</p>\n<p>De voortgang wordt automatisch berekend op basis van afgeronde subtaken. De balk is een hulpmiddel en geen beoordeling. Nul procent betekent alleen dat nog geen subtaak is afgerond.</p>"},"guidance":{"icon": "🧭", "title": "Help mij op weg", "subtitle": "Vijf vaste vragen om een taak te verduidelijken", "body": "<p>Help mij op weg is bedoeld voor momenten waarop een taak vaag, overweldigend of moeilijk te starten voelt.</p>\n<ol><li>Móét ik dit vandaag doen?</li><li>Moet ík dit vandaag doen?</li><li>Moet ik dít vandaag doen?</li><li>Moet ik dit vandaag doen?</li><li>Moet ik dit vandaag dóén?</li></ol>\n<p>De vragen onderzoeken noodzaak, verantwoordelijkheid, duidelijkheid, timing en het soort actie. De app kan voorstellen om te doen, uit te stellen, delegeren, hulp te vragen, verduidelijken, voorbereiden of opdelen.</p>\n<p>De functie gebruikt vaste beslisregels en geen kunstmatige intelligentie. Jij bepaalt altijd zelf wat passend en veilig is.</p>"},"adhd":{"icon": "🧠", "title": "ADHD als inspiratie", "subtitle": "Minder afhankelijk zijn van werkgeheugen en motivatie", "body": "<p>Pace Within is mede geïnspireerd door ervaringen met ADHD. ADHD kan invloed hebben op starten, prioriteiten, tijdsbesef, werkgeheugen, overzicht en het opdelen van grote taken.</p>\n<p>Counters maken patronen zichtbaar. Taken en subtaken halen informatie uit je hoofd. Help mij op weg biedt structuur wanneer iets onduidelijk of overweldigend voelt.</p>\n<p>Niet iedere functie werkt voor iedereen. Gebruik wat helpt en laat weg wat extra druk geeft.</p>\n<p>De app stelt geen ADHD-diagnose en vervangt geen behandeling of begeleiding.</p>"},"everyone":{"icon": "🌍", "title": "Voor iedereen", "subtitle": "Geen diagnose of vaste werkwijze nodig", "body": "<p>Hoewel ADHD een inspiratiebron is, is Pace Within bedoeld voor iedereen die gebeurtenissen wil registreren, patronen wil terugzien of taken overzichtelijker wil maken.</p>\n<p>Je kunt alleen Counters gebruiken, alleen Taken, of beide. Er is geen verplicht aantal registraties en geen voorgeschreven routine.</p>\n<p>De app past zich aan jouw gebruik aan, niet andersom.</p>"},"features":{"icon": "✨", "title": "Alle functies", "subtitle": "Een compleet overzicht van wat de app nu biedt", "body": "<h3>Counters</h3><ul><li>Aanmaken, bewerken, dupliceren, archiveren en herstellen</li><li>Registraties met datum, tijd en notitie</li><li>Oude registraties toevoegen</li><li>Tijdlijninzichten en dagen sinds laatste registratie</li></ul>\n<h3>Logboek</h3><ul><li>Chronologische tijdlijn van actieve Counters</li><li>Direct terug naar de bijbehorende Counter</li></ul>\n<h3>Taken</h3><ul><li>Vandaag, Later en Wachten op</li><li>Subtaken, volgende stap en voortgang</li><li>Deadlines en opvolgdatums</li><li>Help mij op weg</li></ul>\n<h3>Algemeen</h3><ul><li>Nederlands en Engels</li><li>Meerdere thema’s en interfacegroottes</li><li>Pincode, lokale opslag en offlinegebruik</li><li>Volledige en losse takenback-ups</li></ul>"},"timelineInsights":{"icon": "📆", "title": "Tijdlijninzichten", "subtitle": "Zie afstand tussen registraties zonder conclusies te forceren", "body": "<p>Per Counter kun je laten zien hoeveel dagen sinds de laatste registratie zijn verstreken en hoeveel dagen tussen twee registraties zaten.</p>\n<p>Dit kan nuttig zijn bij klachten, sport, gewoontes of gebeurtenissen die niet dagelijks voorkomen.</p>\n<p>De cijfers tonen alleen tijdsverschillen. Ze verklaren niet waarom iets gebeurde en vormen geen medische of psychologische conclusie.</p>"},"gettingStarted":{"icon": "🚀", "title": "Aan de slag", "subtitle": "Begin klein en bouw alleen uit wat helpt", "body": "<h3>Met Counters</h3><ol><li>Maak één Counter aan.</li><li>Kies een duidelijke naam.</li><li>Voeg een registratie toe wanneer iets gebeurt.</li><li>Schrijf alleen een notitie wanneer die context toevoegt.</li></ol>\n<h3>Met Taken</h3><ol><li>Voeg één taak toe.</li><li>Kies Vandaag, Later of Wachten op.</li><li>Deel de taak op wanneer hij te groot voelt.</li><li>Kies één volgende stap.</li></ol>\n<p>Een eenvoudig systeem dat je werkelijk gebruikt is waardevoller dan een uitgebreid systeem dat extra druk geeft.</p>"},"backup":{"icon": "💾", "title": "Back-ups en herstel", "subtitle": "Lokale opslag betekent ook zelf veilig bewaren", "body": "<p>Pace Within bewaart gegevens lokaal. Dat beschermt je privacy, maar gegevens kunnen verloren gaan bij verwijderen van de app, wissen van websitegegevens, een defect toestel of overstappen naar een ander apparaat.</p>\n<h3>Volledige back-up</h3><p>Bevat Counters, registraties, Logboekgegevens, Taken, subtaken, begeleidingsuitkomsten en instellingen.</p>\n<h3>Alleen Taken</h3><p>Maakt een losse takenback-up. Deze kan later worden toegevoegd of gebruikt om alleen de huidige taken te vervangen.</p>\n<h3>Samenvoegen of vervangen</h3><p>Vervangen kan huidige gegevens wissen. Maak daarom vooraf een actuele back-up en bewaar deze bijvoorbeeld in iCloud Drive of een andere veilige persoonlijke opslag.</p>"},"privacy":{"icon": "🔒", "title": "Privacy en lokale opslag", "subtitle": "Controle over je gegevens blijft bij jou", "body": "<p>Er is geen account nodig en de inhoud van Counters, notities en Taken wordt lokaal in de browser of geïnstalleerde webapp opgeslagen.</p>\n<p>Er is geen automatische synchronisatie tussen apparaten. Back-ups moet je daarom zelf bewaren en overzetten.</p>\n<p>De pincode voorkomt eenvoudige toegang via het appscherm, maar is geen volledige versleuteling van je apparaat.</p>\n<p>Deel back-upbestanden niet onnodig en gebruik je eigen afweging bij zeer gevoelige informatie.</p>"},"professionalHelp":{"icon": "🩺", "title": "Professionele hulp en grenzen", "subtitle": "Een hulpmiddel, geen diagnose of behandeling", "body": "<p>Pace Within is een persoonlijk hulpmiddel voor registratie, overzicht, reflectie en planning.</p>\n<p>De app vervangt geen arts, psycholoog, psychiater, therapeut, coach, juridisch adviseur, financieel deskundige of andere professionele hulpverlener.</p>\n<p>Registraties, tijdlijninzichten en uitkomsten van Help mij op weg vormen geen diagnose, behandeling of professioneel advies.</p>\n<p>Neem bij lichamelijke of psychische klachten, zorgen over medicatie, aanhoudende problemen of belangrijke beslissingen contact op met een passende professional of instantie.</p>\n<p><strong>Bij een acute of gevaarlijke situatie moet je direct lokale hulpdiensten of een bevoegde hulpverlener inschakelen en niet wachten op ondersteuning vanuit een app.</strong></p>\n<p>Pace Within kan wel helpen om gebeurtenissen, klachten en vragen overzichtelijk voor te bereiden voor een gesprek met een professional.</p>"},"faq":{"icon": "❓", "title": "Veelgestelde vragen", "subtitle": "Praktische antwoorden over gebruik en gegevens", "body": "<p><strong>Waar staan mijn gegevens?</strong><br>Lokaal op het apparaat waarop je de app gebruikt.</p>\n<p><strong>Heb ik een account nodig?</strong><br>Nee.</p>\n<p><strong>Synchroniseert de app automatisch?</strong><br>Nee, gebruik een back-up om gegevens over te zetten.</p>\n<p><strong>Wat gebeurt er bij verwijderen?</strong><br>Lokale gegevens kunnen verdwijnen. Maak vooraf een back-up.</p>\n<p><strong>Kan ik een losse Pace Within Tasks-back-up gebruiken?</strong><br>Ja, via Taken importeren.</p>\n<p><strong>Geeft Help mij op weg professioneel advies?</strong><br>Nee, de functie gebruikt vaste praktische beslisregels.</p>\n<p><strong>Werkt de app offline?</strong><br>De geladen en geïnstalleerde appbasis is ontworpen voor offlinegebruik.</p>"},"feedback":{"icon": "❤️", "title": "Feedback en ontwikkeling", "subtitle": "Praktische feedback helpt de app stap voor stap verbeteren", "body": "<p>Je kunt fouten, onduidelijke teksten, toegankelijkheidsproblemen en ideeën melden via Feedback en contact.</p>\n<p>Vermeld bij een fout bij voorkeur apparaat, browser, versie, uitgevoerde stappen, verwacht gedrag en werkelijk gedrag.</p>\n<p>Deel geen gevoelige inhoud uit je notities of Taken wanneer dat niet nodig is.</p>\n<p>Feedback wordt zorgvuldig bekeken, maar niet iedere suggestie kan worden toegevoegd.</p>"},"philosophy":{"icon": "🛡️", "title": "Mijn visie", "subtitle": "Rust, eigen regie en geen onnodige druk", "body": "<p>Pace Within is ontwikkeld vanuit het idee dat een hulpmiddel rust moet geven en geen nieuwe verplichting moet worden.</p>\n<p>De app gebruikt geen streaks, straffen of schuldgevoel wanneer je iets niet hebt geregistreerd of afgerond.</p>\n<p>Een taak die blijft staan betekent niet dat je lui bent. Soms ontbreken duidelijkheid, tijd, energie, informatie of de juiste omstandigheden.</p>\n<p>Belangrijke uitgangspunten zijn privacy, eenvoud, natuurlijke taal, rustige vormgeving, kleine stappen, eigen regie en geen reclame.</p>"},"developer":{"icon": "👨‍💻", "title": "Over de ontwikkelaar", "subtitle": "Een persoonlijk project dat stap voor stap is gegroeid", "body": "<p>Pace Within begon als een persoonlijk project en is stap voor stap uitgegroeid tot een complete app voor registratie, overzicht en het kleiner maken van taken.</p>\n<p>De app is ontstaan vanuit een praktische behoefte aan een eenvoudige en rustige manier om gebeurtenissen vast te leggen, patronen terug te zien en grotere taken op te delen in kleinere, haalbare stappen.</p>\n<p>Bij de ontwikkeling ligt de aandacht vooral op:</p><ul><li>eenvoud en overzicht;</li><li>privacy en lokale opslag;</li><li>rustige en duidelijke vormgeving;</li><li>prettig gebruik op mobiele apparaten;</li><li>functies die in de praktijk echt iets toevoegen.</li></ul>\n<p>Pace Within wordt stap voor stap ontwikkeld, gebruikt en getest. Het is geen product van een medische, psychologische, juridische of andere professionele organisatie.</p>\n<p>Contactgegevens en mogelijkheden om feedback te geven vind je onder <strong>Feedback en contact</strong>.</p>"},"roadmap":{"icon": "🗺️", "title": "Roadmap", "subtitle": "De richting voor verdere ontwikkeling", "body": "<h3>Journal</h3><ul><li>Beter zoeken en filteren</li><li>Uitgebreider Logboek en export</li><li>Meer herstelmogelijkheden</li><li>Toegankelijkheid en voorbereiding openbare release</li></ul>\n<h3>Taken</h3><ul><li>Delen en tekstexport</li><li>Agenda-export</li><li>Zachte herinneringen</li><li>Ondersteuning bij taken die blijven liggen</li><li>Bulkacties, focusmodus en tijd- of energie-inschatting</li></ul>\n<p>De roadmap is een richting en geen vaste belofte. Technische haalbaarheid, privacy, veiligheid en feedback bepalen de uiteindelijke volgorde.</p>"},"updates":{"icon": "🔄", "title": "Updates en offlinegebruik", "subtitle": "Hoe nieuwe versies en de lokale cache werken", "body": "<p>Pace Within is een Progressive Web App en kan via een browser worden geopend of op het beginscherm worden geïnstalleerd.</p>\n<p>Een lokale cache zorgt ervoor dat de belangrijkste apponderdelen na correct laden ook zonder actieve internetverbinding beschikbaar zijn.</p>\n<p>Bij een nieuwe versie kun je direct bijwerken of dit uitstellen. Lokale gegevens blijven normaal behouden, maar een actuele back-up blijft verstandig.</p>\n<p>Wanneer een update niet zichtbaar wordt, kun je via Instellingen de appcache vernieuwen. Verwijder de app of websitegegevens niet zonder recente back-up.</p>"},"whatsNew":{"icon": "🆕", "title": "Nieuw in deze versie", "subtitle": "Versie ${TJ_VERSION}", "body": "<div class=\"release-card current\"><strong>Versie ${TJ_VERSION}</strong><span>${TJ_RELEASE} · Build ${TJ_BUILD}</span><ul><li>Alle onderdelen van Hulp en tips zijn uitgebreid</li><li>Professionele hulp en grenzen zijn duidelijk opgenomen</li><li>Terugkeren uit een artikel herstelt de vorige scrollpositie</li><li>Swipe vanaf de linkerzijde werkt op passende verdiepingsschermen</li></ul></div>"}};

function cleanupRecentlyDeleted() {
  const cutoff = Date.now() - 30 * 86400000;
  const before = state.deletedCounters.length;
  state.deletedCounters = state.deletedCounters.filter(c => new Date(c.deletedAt || 0).getTime() >= cutoff);
  if (before !== state.deletedCounters.length) saveState(state, false);
}
function moveCounterToRecentlyDeleted(counterId) {
  const counter = getCounter(counterId); if (!counter) return;
  state.deletedCounters.push({...JSON.parse(JSON.stringify(counter)), deletedAt:new Date().toISOString()});
  state.counters = state.counters.filter(c => c.id !== counterId);
  selectedCounterId = null; saveState(state); showToast("Moved to Recently Deleted"); render();
}
function restoreDeletedCounter(counterId) {
  const item = state.deletedCounters.find(c => c.id===counterId); if(!item) return;
  const restored=JSON.parse(JSON.stringify(item)); delete restored.deletedAt; restored.archived=false;
  if(state.counters.some(c=>c.id===restored.id)) restored.id=uid();
  state.counters.push(restored); state.deletedCounters=state.deletedCounters.filter(c=>c.id!==counterId);
  saveState(state); showToast("Counter restored"); renderRecentlyDeleted();
}
function permanentlyDeleteCounter(counterId) {
  const item=state.deletedCounters.find(c=>c.id===counterId); if(!item) return;
  if(!confirm(`Permanently delete "${item.name}"? This cannot be undone.`)) return;
  state.deletedCounters=state.deletedCounters.filter(c=>c.id!==counterId); saveState(state); showToast("Deleted permanently"); renderRecentlyDeleted();
}
function emptyRecentlyDeleted() {
  if(!state.deletedCounters.length || !confirm("Permanently delete all recently deleted counters?")) return;
  state.deletedCounters=[]; saveState(state); showToast("Recently Deleted emptied"); renderRecentlyDeleted();
}
function daysRemaining(item) { return Math.max(0, Math.ceil((new Date(item.deletedAt).getTime()+30*86400000-Date.now())/86400000)); }
function renderRecentlyDeleted() {
  cleanupRecentlyDeleted(); screen="deleted"; selectedCounterId=null;
  app.innerHTML=`<div class="header"><div><div class="eyebrow">Recovery</div><h1>Recently Deleted</h1><div class="subtitle">${state.deletedCounters.length} ${state.deletedCounters.length === 1 ? "item" : "items"} · Automatically removed after 30 days.</div></div><button onclick="returnToSettings()">Done</button></div>${state.deletedCounters.length?`<button class="settings-row danger" onclick="emptyRecentlyDeleted()"><span>Empty Recently Deleted</span><span>${state.deletedCounters.length}</span></button><div class="list deleted-list">${state.deletedCounters.slice().sort((a,b)=>new Date(b.deletedAt)-new Date(a.deletedAt)).map(c=>`<div class="deleted-card" style="--accent:${c.color||'#d7b56d'}"><div class="emoji">${escapeHtml(c.emoji||'📌')}</div><div class="deleted-content"><strong>${escapeHtml(c.name)}</strong><small>${(c.entries||[]).length} entries · ${daysRemaining(c)} days remaining</small></div><div class="deleted-actions"><button class="success" onclick="restoreDeletedCounter('${c.id}')">Restore</button><button class="danger" onclick="permanentlyDeleteCounter('${c.id}')">Delete</button></div></div>`).join('')}</div>`:`<div class="empty">No recently deleted counters.</div>`}`;
  app.scrollTo(0,0);
}

function render() {
  queueMicrotask(() => applyTranslations(document));
  if (locked) return showLockScreen();

  if (!state.settings.onboardingCompleted) {
    if (!document.querySelector(".tj-onboarding")) showOnboarding(0);
    return;
  }

  if (screen === "help") {
    return helpArticle ? renderHelpArticle(helpArticle) : renderHelpCenter();
  }
  if (screen === "deleted") return renderRecentlyDeleted();

  if (selectedCounterId) return renderDetail(selectedCounterId);
  if (screen === "settings") {
    renderSettings();
  } else if (screen === "journal") {
    renderJournal();
  } else if (screen === "tasks") {
    renderTasks();
  } else {
    renderHome();
  }

  setTimeout(runStartupChecks, 300);
  scheduleAutomaticUpdateCheck();
  setTimeout(showReleaseOverlayIfNeeded, 900);
  translationObserver.observe(document.body, { childList: true, subtree: true });

}

function todayKey(date = new Date()) {
  return new Intl.DateTimeFormat("sv-SE", { timeZone: "Europe/Amsterdam", dateStyle: "short" }).format(new Date(date));
}

function formatDate(value) {
  const date = new Date(value);
  return new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", { day: "2-digit", month: "short", year: "numeric" }).format(date) + " • " +
         new Intl.DateTimeFormat(currentLanguage() === "nl" ? "nl-NL" : "en-GB", { timeStyle: "short" }).format(date);
}

function lastText(counter) {
  const entry = counter.entries?.[0];
  return entry ? formatDate(entry.dateTime) : "No entries yet";
}

function sortedCounters() {
  return [...state.counters].sort((a, b) => {
    const aTime = a.entries?.[0]?.dateTime || a.createdAt || 0;
    const bTime = b.entries?.[0]?.dateTime || b.createdAt || 0;
    return new Date(bTime) - new Date(aTime);
  });
}

    today: nl ? "Vandaag" : "Today",

  };
  return labels[bucket] || labels.today;
}

function formatTaskDate(dateValue,nl=currentLanguage()==="nl"){
  if(!dateValue) return "";
  const date=new Date(`${dateValue}T12:00:00`);
  if(Number.isNaN(date.getTime())) return "";
  return new Intl.DateTimeFormat(nl?"nl-NL":"en-GB",{day:"numeric",month:"short",year:"numeric"}).format(date);
}
function taskDateLabel(task,nl=currentLanguage()==="nl"){
  if(!task?.dueDate) return "";
  const label=task.bucket==="waiting"?(nl?"Opvolgen":"Follow up"):(nl?"Datum":"Date");
  return `${label} ${formatTaskDate(task.dueDate,nl)}`;
}

function normalizeSubtask(subtask) {
  return {
    id: subtask?.id || uid(),
    title: String(subtask?.title || "").trim(),
    completed: Boolean(subtask?.completed),
    createdAt: subtask?.createdAt || new Date().toISOString(),
    updatedAt: subtask?.updatedAt || subtask?.createdAt || new Date().toISOString(),
    completedAt: subtask?.completedAt || ""
  };
}

function normalizeTask(task) {
  const subtasks = Array.isArray(task.subtasks)
    ? task.subtasks.map(normalizeSubtask).filter(subtask => subtask.title)
    : [];
  const nextStepId = subtasks.some(subtask => subtask.id === task.nextStepId && !subtask.completed)
    ? task.nextStepId
    : (subtasks.find(subtask => !subtask.completed)?.id || "");
  return {
    id: task.id || uid(),
    title: String(task.title || "").trim(),
    bucket: ["today","later","waiting"].includes(task.bucket) ? task.bucket : "today",
    status: task.status === "completed" ? "completed" : "active",
    subtasks,
    nextStepId,
    guidance: task.guidance && typeof task.guidance === "object" ? task.guidance : null,
    dueDate: /^\d{4}-\d{2}-\d{2}$/.test(String(task.dueDate || "")) ? String(task.dueDate) : "",
    createdAt: task.createdAt || new Date().toISOString(),
    updatedAt: task.updatedAt || task.createdAt || new Date().toISOString(),
    completedAt: task.completedAt || ""
  };
}

function ensureNormalizedTasks() {
  state.tasks = (state.tasks || []).map(normalizeTask).filter(task => task.title);
}

function taskProgress(task) {
  const total = task.subtasks?.length || 0;
  const completed = total ? task.subtasks.filter(subtask => subtask.completed).length : 0;
  return { total, completed, percent: total ? Math.round((completed / total) * 100) : 0 };
}
