function guidanceOutcome(draft,nl) {
  const a=draft.answers;
  const bucket=(a.who==="waiting"||a.who==="delegate")?"waiting":(a.when==="today"?"today":"later");
  const advice=[];
  if(a.must==="drop") advice.push(nl?"Overweeg deze taak niet op te slaan of te verwijderen.":"Consider not saving or deleting this task.");
  else if(a.must==="doubt") advice.push(nl?"Maak eerst duidelijk waarom deze taak belangrijk is.":"First clarify why this task matters.");
  else if(a.must==="important") advice.push(nl?"Belangrijk, maar hij hoeft niet per se vandaag af.":"Important, but it does not have to be finished today.");
  if(a.who==="help") advice.push(nl?"Vraag iemand om hulp bij één concrete stap.":"Ask someone for help with one concrete step.");
  if(a.who==="delegate") advice.push(nl?"Draag de taak over en zet hem bij Wachten op.":"Delegate the task and place it under Waiting on.");
  if(a.who==="waiting") advice.push(nl?"Zet hem bij Wachten op en bepaal later wanneer je opvolgt.":"Place it under Waiting on and decide when to follow up.");
  if(a.this==="big") advice.push(nl?"Deel de taak op in kleine subtaken.":"Break the task into small subtasks.");
  if(a.this==="vague") advice.push(nl?"Herschrijf de taak als één zichtbare, concrete actie.":"Rewrite the task as one visible, concrete action.");
  if(a.this==="other") advice.push(nl?"Controleer of dit wel de juiste hoofdtaak is.":"Check whether this is actually the right main task.");
  const m={
    finish:nl?"Doel: volledig afronden.":"Goal: finish it.",
    start:nl?"Doel: alleen beginnen; vijf minuten is genoeg.":"Goal: only start; five minutes is enough.",
    prepare:nl?"Doel: alleen voorbereiden wat je nodig hebt.":"Goal: only prepare what you need.",
    decide:nl?"Doel: alleen een besluit nemen.":"Goal: only make a decision.",
    schedule:nl?"Doel: alleen een goed moment inplannen.":"Goal: only schedule a suitable time."
  };
  advice.push(m[a.do]||m.start);
  return {bucket,advice};
}

function saveGuidedTask(dialog,useSuggestion=true) {
  const nl=currentLanguage()==="nl";
  if(!guidanceDraft) return;
  const selectedBucket=document.getElementById("guidanceBucket")?.value||"later";
  const selectedDueDate=document.getElementById("guidanceDate")?.value||"";
  const stepTitles=[...document.querySelectorAll(".guidance-step-input")].map(input=>input.value.trim()).filter(Boolean);
  const outcome=guidanceOutcome(guidanceDraft,nl);
  const targetBucket=useSuggestion ? selectedBucket : guidanceDraft.initialBucket;
  const startPlan = {
    before: document.getElementById("startPlanBefore")?.value.trim() || "",
    now: document.getElementById("startPlanNow")?.value.trim() || "",
    after: document.getElementById("startPlanAfter")?.value.trim() || ""
  };
  const hasStartPlan = Object.values(startPlan).some(Boolean);
  if (!stepTitles.length && startPlan.now) stepTitles.push(startPlan.now);
  const guidanceData={
    completedAt:new Date().toISOString(),
    answers:{...guidanceDraft.answers},
    advice:outcome.advice,
    appliedSuggestion:!!useSuggestion,
    selectedBucket,
    startPlan: hasStartPlan ? startPlan : null,
    version:3
  };

  if(guidanceDraft.taskId){
    const task=state.tasks.find(t=>t.id===guidanceDraft.taskId);
    if(!task) return;
    if(useSuggestion) task.bucket=targetBucket;
    task.dueDate=selectedDueDate;

    if(stepTitles.length){
      const existingNext=task.subtasks?.find(s=>s.id===task.nextStepId && !s.completed);
      const titlesToAdd=[...stepTitles];
      if(existingNext) existingNext.title=titlesToAdd.shift();
      const newSubs=titlesToAdd.map(title=>normalizeSubtask({id:uid(),title}));
      task.subtasks=[...(task.subtasks||[]),...newSubs];
      if(!task.nextStepId){
        const firstOpen=(task.subtasks||[]).find(s=>!s.completed);
        task.nextStepId=firstOpen?.id||"";
      }
    }

    task.guidance=guidanceData;
    task.updatedAt=new Date().toISOString();
    taskFilter=task.bucket;
  } else {
    const subtasks=stepTitles.map(title=>normalizeSubtask({id:uid(),title}));
    const task=normalizeTask({
      id:uid(), title:guidanceDraft.title, bucket:targetBucket, dueDate:selectedDueDate, subtasks,
      nextStepId:subtasks[0]?.id||"",
      guidance:guidanceData
    });
    state.tasks.unshift(task);
    taskFilter=targetBucket;
  }

  saveState(state);
  dialog?.remove();
  guidanceDraft=null;
  screen = "tasks";
  selectedCounterId = null;
  renderTasks();
}

function toggleSubtask(taskId, subtaskId) {
  const task = state.tasks.find(t => t.id === taskId);
  const subtask = task?.subtasks?.find(s => s.id === subtaskId);
  if (!task || !subtask) return;
  subtask.completed = !subtask.completed;
  subtask.completedAt = subtask.completed ? new Date().toISOString() : "";
  subtask.updatedAt = new Date().toISOString();
  if (subtask.completed && task.nextStepId === subtaskId) {
    task.nextStepId = task.subtasks.find(s => !s.completed)?.id || "";
  }
  if (!subtask.completed && !task.nextStepId) task.nextStepId = subtask.id;
  const progress = taskProgress(task);
  if (progress.total && progress.completed === progress.total) {
    task.status = "completed";
    task.completedAt = new Date().toISOString();
    task.nextStepId = "";
  } else if (task.status === "completed") {
    task.status = "active";
    task.completedAt = "";
  }
  task.updatedAt = new Date().toISOString();
  saveState(state);
  screen = "tasks";
  selectedCounterId = null;
  renderTasks();
}

function deleteSubtask(taskId, subtaskId, dialog) {

  const task = state.tasks.find(t => t.id === taskId);
  const subtask = task?.subtasks?.find(s => s.id === subtaskId);

  screen = "tasks";

function homeInsightText(counter) {
  if (!counter.showDaysBetweenEntries) return "";

  const entries = (counter.entries || [])
    .map(entry => {
      const raw = entry.dateTime || entry.date || entry.createdAt || "";
      const parsed = raw ? new Date(raw) : null;
      return {
        ...entry,
        _parsedDate: parsed && !Number.isNaN(parsed.getTime()) ? parsed : null
      };
    })
    .filter(entry => entry._parsedDate)
    .sort((a, b) => b._parsedDate - a._parsedDate);

  if (!entries.length) return "No entries yet";

  const latest = entries[0]._parsedDate;
  const today = new Date();

  const latestDay = new Date(latest.getFullYear(), latest.getMonth(), latest.getDate());
  const todayDay = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const diff = Math.max(0, Math.round((todayDay - latestDay) / 86400000));

  if (diff === 0) return "Today";
  if (diff === 1) return "1 day since last entry";
  return `${diff} days since last entry`;
}

}


function calendarDayDifference(newerDateTime, olderDateTime) {
  const newer = new Date(newerDateTime);
  const older = new Date(olderDateTime);
  const newerDay = Date.UTC(newer.getFullYear(), newer.getMonth(), newer.getDate());
  const olderDay = Date.UTC(older.getFullYear(), older.getMonth(), older.getDate());
  return Math.max(0, Math.round((newerDay - olderDay) / 86400000));
}

function daysSinceLatestEntry(counter) {
  const entries = (counter.entries || []).slice().sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
  if (!entries.length) return null;
  return calendarDayDifference(new Date().toISOString(), entries[0].dateTime);
}

function renderCounterTimeline(counter) {
  const entries = (counter.entries || []).slice().sort((a,b) => new Date(b.dateTime) - new Date(a.dateTime));
  if (!entries.length) return `<div class="empty">No entries yet.</div>`;

  const rows = entries.map((entry, index) => {
    const older = entries[index + 1];
    const gap = older ? calendarDayDifference(entry.dateTime, older.dateTime) : 0;
    return `
      <div class="entry timeline-entry">
        <div class="entry-content" onclick="openEntryDialog('${counter.id}', false, '${entry.id}')">
          <strong>${formatDate(entry.dateTime)}</strong>
          <p>${entry.note ? escapeHtml(entry.note) : "No note"}</p>
        </div>
        ${counter.archived ? "" : `<button class="danger entry-delete-fixed" onclick="deleteEntry('${counter.id}', '${entry.id}')">×</button>`}
      </div>
      ${counter.showDaysBetweenEntries && gap > 0 ? `
        <div class="day-gap-marker"><span></span><strong>${gap} ${gap === 1 ? "day" : "days"} later</strong><span></span></div>
      ` : ""}
    `;
  }).join("");

  const since = daysSinceLatestEntry(counter);
  const sinceBlock = counter.showDaysBetweenEntries && since > 0
    ? `<div class="since-last-entry">🗓️ ${since} ${since === 1 ? "day" : "days"} since last entry</div>`
    : "";

  return rows + sinceBlock;
}

function toLocalInput(value) {
  const date = new Date(value);
  const pad = n => String(n).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function openCounterMenu(counterId) {
  const counter = getCounter(counterId);
  if (!counter) return;

  const dialog = document.createElement("dialog");
  dialog.className = "counter-action-dialog";

  dialog.innerHTML = `
    <div class="modal counter-menu-modal">
      <div class="counter-menu-handle"></div>
      <div class="counter-menu-title">
        <div class="emoji">${escapeHtml(counter.emoji || "📌")}</div>
        <div>
          <strong>${escapeHtml(counter.name)}</strong>
          <small>${(counter.entries || []).length} ${(counter.entries || []).length === 1 ? "entry" : "entries"}</small>
        </div>
      </div>

      <div class="counter-menu-list">
        <button class="counter-menu-item archive-menu"
                onclick="${counter.archived ? `restoreCounter('${counter.id}')` : `archiveCounter('${counter.id}')`}; this.closest('dialog').remove()">
          <span>${counter.archived ? "↩️" : "📦"}</span>
          <div><strong>${counter.archived ? "Restore" : "Archive"}</strong><small>${counter.archived ? "Move back to Active" : "Move out of Active"}</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="this.closest('dialog').remove(); openCounterDialog('${counter.id}')">
          <span>🎨</span>
          <div><strong>Change Color</strong><small>Choose another counter color</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="this.closest('dialog').remove(); openCounterDialog('${counter.id}')">
          <span>✏️</span>
          <div><strong>Rename</strong><small>Change the name or emoji</small></div>
        </button>

        <button class="counter-menu-item"
                onclick="toggleDaysBetweenFromMenu('${counter.id}', this.closest('dialog'))">
          <span>📅</span>
          <div>
            <strong>${counter.showDaysBetweenEntries ? "Hide Days Between Entries" : "Show Days Between Entries"}</strong>
            <small>${counter.showDaysBetweenEntries ? "Remove day-gap markers from this timeline" : "Display day-gap markers in this timeline"}</small>
          </div>
        </button>

        <button class="counter-menu-item"
                onclick="duplicateCounter('${counter.id}'); this.closest('dialog').remove()">
          <span>📄</span>
          <div><strong>Duplicate</strong><small>Create a copy without entries</small></div>
        </button>

        <button class="counter-menu-item delete-menu"
                onclick="deleteCounter('${counter.id}'); this.closest('dialog').remove()">
          <span>🗑️</span>
          <div><strong>Delete</strong><small>Move to Recently Deleted</small></div>
        </button>
      </div>

      <button class="counter-menu-cancel" onclick="this.closest('dialog').remove()">Cancel</button>
    </div>
  `;

  document.body.appendChild(dialog);
  dialog.addEventListener("close", () => dialog.remove());
  dialog.showModal();
}


function toggleDaysBetweenFromMenu(counterId, dialog) {
  const counter = getCounter(counterId);
  if (!counter) return;

  counter.showDaysBetweenEntries = !counter.showDaysBetweenEntries;
  saveState(state);

  if (dialog) dialog.remove();
  showToast(counter.showDaysBetweenEntries ? "Day gaps enabled" : "Day gaps disabled");

  if (selectedCounterId === counterId) {
    renderDetail(counterId);
  } else {
    render();
  }
}

function duplicateCounter(counterId) {
  const counter = getCounter(counterId);
  if (!counter) return;

  state.counters.push({
    id: uid(),
    name: `${counter.name} Copy`,
    emoji: counter.emoji || "📌",
    color: counter.color || "#d7b56d",
    archived: false,
    showDaysBetweenEntries: !!counter.showDaysBetweenEntries,
    createdAt: new Date().toISOString(),
    entries: []
  });

  saveState(state);
  showToast("Counter duplicated");
  render();
}

function archiveCounter(counterId) {
  const counter = getCounter(counterId);
  if (!confirm(`Archive "${counter.name}"?`)) return;
  counter.archived = true;
  selectedCounterId = null;
  saveState(state);
  render();
}

function restoreCounter(counterId) {
  const counter = getCounter(counterId);
  counter.archived = false;
  selectedCounterId = null;
  saveState(state);
  render();
}

function deleteCounter(counterId) { const c=getCounter(counterId); if(c&&confirm(`Move "${c.name}" to Recently Deleted?`)) moveCounterToRecentlyDeleted(counterId); }

function deleteEntry(counterId, entryId) {
  const counter = getCounter(counterId);
  if (!confirm("Delete this entry?")) return;
  counter.entries = counter.entries.filter(e => e.id !== entryId);
  saveState(state);
  render();
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(() => {}));
}

render();

  </script>
</body>
</html>
