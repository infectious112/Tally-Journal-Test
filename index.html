
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"><meta name="theme-color" content="#0b0d12"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="TallyLog"><link rel="manifest" href="manifest.json"><title>TallyLog</title><style>
:root{--bg:#0b0d12;--bg2:#11141c;--card:rgba(255,255,255,.075);--card2:rgba(255,255,255,.105);--line:rgba(255,255,255,.12);--text:#f5f7fb;--muted:rgba(245,247,251,.62);--muted2:rgba(245,247,251,.42);--gold:#d7b56d;--red:#ff6b6b;--shadow:rgba(0,0,0,.35);--radius:24px;--safeTop:env(safe-area-inset-top);--safeBottom:env(safe-area-inset-bottom)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top left,rgba(215,181,109,.18),transparent 32rem),radial-gradient(circle at bottom right,rgba(110,168,255,.16),transparent 30rem),linear-gradient(180deg,var(--bg),var(--bg2));color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif}button,input,textarea{font:inherit}button{border:0;border-radius:999px;padding:12px 16px;font-weight:750;color:#0b0d12;background:var(--text);cursor:pointer}button:active{transform:scale(.98)}.ghost{color:var(--text);background:rgba(255,255,255,.10);border:1px solid var(--line)}.danger{color:#fff;background:rgba(255,107,107,.20);border:1px solid rgba(255,107,107,.35)}.warning{color:#17120a;background:linear-gradient(135deg,#ffe08a,#f0b429)}.success{color:#07130d;background:linear-gradient(135deg,#a7f3c5,#45d383)}.gold{background:linear-gradient(135deg,#f4dc9f,#caa45f);color:#15120b;box-shadow:0 12px 28px rgba(215,181,109,.20)}.icon-button{width:46px;height:46px;padding:0;display:grid;place-items:center;font-size:28px;line-height:1}.app{max-width:860px;margin:0 auto;padding:calc(18px + var(--safeTop)) 16px calc(24px + var(--safeBottom))}header{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.eyebrow{color:var(--gold);font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}h1{margin:0;font-size:34px;letter-spacing:-.04em;line-height:1}.subtitle{color:var(--muted);margin-top:8px;font-size:15px}.toolbar{display:flex;gap:10px;align-items:center}.toolbar .small{padding:11px 13px;font-size:14px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;padding:5px;margin:10px 0 14px}.tab{background:transparent;color:var(--muted);box-shadow:none;padding:11px 12px;border-radius:14px}.tab.active{color:#15120b;background:linear-gradient(135deg,#f4dc9f,#caa45f)}.search{margin:12px 0 16px;position:relative}.search input{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:18px;padding:14px 16px 14px 44px;outline:none}.search span{position:absolute;left:16px;top:13px;color:var(--muted2)}.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.summary-card{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:20px;padding:13px;min-height:74px}.summary-number{font-size:24px;font-weight:850;letter-spacing:-.03em}.summary-label{color:var(--muted);font-size:12px;margin-top:4px}.counter-list{display:grid;gap:13px}.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius)}.swipe-actions{position:absolute;inset:0 0 0 auto;display:flex;justify-content:flex-end;align-items:stretch;z-index:0;border-radius:var(--radius);overflow:hidden}.swipe-actions button{width:92px;border-radius:0;color:white;font-size:13px;padding:0 10px;box-shadow:none}.archive-action{background:#c99112!important;color:#120d04!important}.delete-action{background:#c24141!important}.counter-card{position:relative;z-index:2;overflow:hidden;background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:0 18px 44px var(--shadow);transition:transform .22s ease;touch-action:pan-y}.counter-card:before{content:"";position:absolute;inset:0;background:linear-gradient(120deg,var(--accent),transparent 42%);opacity:.14;pointer-events:none}.counter-main{position:relative;display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center}.emoji{width:52px;height:52px;border-radius:18px;background:rgba(255,255,255,.10);border:1px solid var(--line);display:grid;place-items:center;font-size:27px}.counter-title{font-size:20px;font-weight:820;letter-spacing:-.02em;margin-bottom:4px}.counter-sub{color:var(--muted);font-size:13px;line-height:1.35}.counter-count{font-size:36px;font-weight:900;letter-spacing:-.05em;text-align:right;min-width:56px}.counter-actions{position:relative;display:flex;gap:9px;margin-top:15px;flex-wrap:wrap}.counter-actions button{padding:11px 14px;font-size:14px}.detail{display:none}.detail.active{display:block}.overview.hidden{display:none}.detail-hero{background:linear-gradient(160deg,rgba(255,255,255,.13),rgba(255,255,255,.06));border:1px solid var(--line);border-radius:30px;padding:20px;box-shadow:0 18px 44px var(--shadow);position:relative;overflow:hidden}.detail-hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at top right,var(--accent),transparent 52%);opacity:.18}.detail-content{position:relative}.backrow{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.detail-name{display:flex;align-items:center;gap:12px;margin-top:10px}.detail-name h2{margin:0;font-size:32px;letter-spacing:-.05em}.big-count{font-size:78px;font-weight:950;letter-spacing:-.08em;line-height:.95;margin:20px 0 8px}.big-plus{width:100%;margin-top:15px;padding:18px;font-size:19px}.section-title{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:850;margin:22px 4px 10px}.entry-list{display:grid;gap:10px}.entry{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:18px;padding:14px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.entry-time{font-weight:800;margin-bottom:5px}.entry-note{color:var(--muted);white-space:pre-wrap;line-height:1.35}.entry-delete{width:36px;height:36px;padding:0;display:grid;place-items:center;border-radius:50%;color:white;background:rgba(255,107,107,.20);border:1px solid rgba(255,107,107,.35)}.empty{text-align:center;color:var(--muted);padding:44px 18px;border:1px dashed var(--line);border-radius:22px;background:rgba(255,255,255,.04)}dialog{width:min(94vw,470px);border:1px solid var(--line);border-radius:28px;padding:0;background:#171a22;color:var(--text);box-shadow:0 30px 80px rgba(0,0,0,.55)}dialog::backdrop{background:rgba(0,0,0,.58);backdrop-filter:blur(4px)}.modal{padding:18px}.modal h2{margin:0 0 14px;font-size:24px;letter-spacing:-.03em}label{display:block;margin:14px 0 7px;font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}input,textarea{width:100%;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:16px;padding:13px;outline:none}textarea{min-height:92px;resize:vertical}.row{display:grid;grid-template-columns:86px 1fr;gap:10px}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px}.swatch{height:36px;border-radius:14px;border:2px solid transparent;background:var(--swatch)}.swatch.selected{border-color:white;box-shadow:0 0 0 2px rgba(255,255,255,.18)}.menu-list{display:grid;gap:9px}.menu-list button{width:100%;border-radius:16px;text-align:left;display:flex;justify-content:space-between;align-items:center;padding:14px}.hint{color:var(--muted);font-size:13px;line-height:1.4;margin-top:10px}.hidden{display:none!important}@media(max-width:520px){.summary-card{padding:11px}.summary-number{font-size:22px}.toolbar .small{display:none}h1{font-size:31px}.counter-count{font-size:34px}.swipe-actions button{width:84px}}
</style></head><body><div class="app"><section id="overview" class="overview"><header><div><div class="eyebrow">Private counter journal</div><h1>TallyLog</h1><div class="subtitle">Track anything. Every tap gets a date, time and note.</div></div><div class="toolbar"><button class="ghost small" onclick="exportJson()">Backup</button><button class="ghost small" onclick="exportCsv()">CSV</button><button class="icon-button gold" onclick="openCounterDialog()">+</button></div></header><div class="tabs"><button id="activeTab" class="tab active" onclick="setViewMode('active')">Active</button><button id="archiveTab" class="tab" onclick="setViewMode('archived')">Archive</button></div><div class="search"><span>⌕</span><input id="searchInput" placeholder="Search counters..." oninput="renderOverview()"></div><div class="summary-grid"><div class="summary-card"><div class="summary-number" id="sumCounters">0</div><div class="summary-label" id="sumCountersLabel">Active</div></div><div class="summary-card"><div class="summary-number" id="sumEntries">0</div><div class="summary-label">Entries</div></div><div class="summary-card"><div class="summary-number" id="sumToday">0</div><div class="summary-label">Today</div></div></div><div id="counterList" class="counter-list"></div><div id="emptyState" class="empty hidden"></div></section><section id="detail" class="detail"></section></div>
<dialog id="counterDialog"><form method="dialog" class="modal" onsubmit="saveCounter(event)"><h2 id="counterModalTitle">New Counter</h2><input type="hidden" id="editCounterId"><div class="row"><div><label for="counterEmoji">Emoji</label><input id="counterEmoji" maxlength="2" value="📌" required></div><div><label for="counterName">Name</label><input id="counterName" placeholder="Coffee, medication, walks" required></div></div><label>Color</label><div id="swatches" class="swatches"></div><input type="hidden" id="counterColor" value="#d7b56d"><div class="modal-actions"><button type="button" class="ghost" onclick="closeCounterDialog()">Cancel</button><button type="submit" class="gold">Save</button></div></form></dialog>
<dialog id="entryDialog"><form method="dialog" class="modal" onsubmit="saveEntry(event)"><h2 id="entryTitle">New Entry</h2><input type="hidden" id="activeCounterId"><label for="entryDateTime">Date and time</label><input id="entryDateTime" type="datetime-local" required><label for="entryNote">Note</label><textarea id="entryNote" placeholder="Optional"></textarea><div class="modal-actions"><button type="button" class="ghost" onclick="closeEntryDialog()">Cancel</button><button type="submit" class="gold">Save</button></div></form></dialog>
<dialog id="menuDialog"><div class="modal"><h2 id="menuTitle">Counter Options</h2><input type="hidden" id="menuCounterId"><div id="menuList" class="menu-list"></div><div class="hint">Tip: swipe left on a counter card for quick actions.</div><div class="modal-actions"><button class="ghost" onclick="closeMenu()">Close</button></div></div></dialog>
<script>
const STORAGE_KEY="tallylog-pwa-v1-1",OLD_STORAGE_KEY="tallylog-pwa-v1",colors=["#d7b56d","#6ea8ff","#61d394","#ff8fab","#c084fc","#fb923c","#22d3ee","#a3e635","#f87171","#facc15","#94a3b8","#f5f7fb"];let counters=load(),selectedColor="#d7b56d",viewMode="active",activeSwipeId=null;function load(){try{const c=JSON.parse(localStorage.getItem(STORAGE_KEY));if(c)return c;const o=JSON.parse(localStorage.getItem(OLD_STORAGE_KEY));if(o){const m=o.map(c=>({...c,archived:!!c.archived}));localStorage.setItem(STORAGE_KEY,JSON.stringify(m));return m}return[]}catch{return[]}}function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(counters))}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function todayKey(d=new Date()){return new Intl.DateTimeFormat("sv-SE",{timeZone:"Europe/Amsterdam",dateStyle:"short"}).format(d)}function formatDateTime(v){return new Intl.DateTimeFormat("en-GB",{dateStyle:"medium",timeStyle:"short"}).format(new Date(v))}function relativeLast(v){if(!v)return"No entries yet";const d=new Date(v),n=new Date(),diff=Math.floor((n-d)/86400000);if(todayKey(d)===todayKey(n))return"Today "+new Intl.DateTimeFormat("en-GB",{timeStyle:"short"}).format(d);let y=new Date();y.setDate(n.getDate()-1);if(todayKey(d)===todayKey(y))return"Yesterday "+new Intl.DateTimeFormat("en-GB",{timeStyle:"short"}).format(d);if(diff<7)return`${diff} days ago`;return formatDateTime(v)}function toDateTimeLocal(d=new Date()){const p=n=>String(n).padStart(2,"0");return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`}function escapeHtml(t){return String(t).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function sortedCounters(){return[...counters].sort((a,b)=>new Date(b.entries?.[0]?.dateTime||b.createdAt||0)-new Date(a.entries?.[0]?.dateTime||a.createdAt||0))}function setViewMode(m){viewMode=m;document.getElementById("activeTab").classList.toggle("active",m==="active");document.getElementById("archiveTab").classList.toggle("active",m==="archived");renderOverview()}function renderOverview(){const list=document.getElementById("counterList"),empty=document.getElementById("emptyState"),q=document.getElementById("searchInput").value.trim().toLowerCase(),base=counters.filter(c=>viewMode==="archived"?c.archived:!c.archived),entries=base.flatMap(c=>c.entries||[]),today=todayKey();document.getElementById("sumCounters").textContent=base.length;document.getElementById("sumCountersLabel").textContent=viewMode==="archived"?"Archived":"Active";document.getElementById("sumEntries").textContent=entries.length;document.getElementById("sumToday").textContent=entries.filter(e=>todayKey(new Date(e.dateTime))===today).length;const filtered=sortedCounters().filter(c=>(viewMode==="archived"?c.archived:!c.archived)&&c.name.toLowerCase().includes(q));list.innerHTML="";empty.classList.toggle("hidden",filtered.length!==0);empty.innerHTML=viewMode==="archived"?"No archived counters.<br>Archived counters will appear here.":"No active counters.<br>Tap + to create your first counter.";filtered.forEach(counter=>{const last=counter.entries?.[0]?.dateTime,wrap=document.createElement("article");wrap.className="swipe-wrap";wrap.innerHTML=`<div class="swipe-actions">${viewMode==="archived"?`<button class="archive-action" onclick="restoreCounter('${counter.id}')">Restore</button><button class="delete-action" onclick="deleteCounter('${counter.id}', true)">Delete</button>`:`<button class="archive-action" onclick="archiveCounter('${counter.id}')">Archive</button><button class="delete-action" onclick="deleteCounter('${counter.id}', false)">Delete</button>`}</div><div class="counter-card" id="card-${counter.id}" style="--accent:${counter.color||"#d7b56d"}"><div class="counter-main" onclick="openDetail('${counter.id}')"><div class="emoji">${escapeHtml(counter.emoji||"📌")}</div><div><div class="counter-title">${escapeHtml(counter.name)}</div><div class="counter-sub">Last entry: ${relativeLast(last)}</div></div><div class="counter-count">${(counter.entries||[]).length}</div></div><div class="counter-actions">${viewMode==="archived"?`<button class="success" onclick="event.stopPropagation(); restoreCounter('${counter.id}')">Restore</button><button class="danger" onclick="event.stopPropagation(); deleteCounter('${counter.id}', true)">Delete</button>`:`<button class="gold" onclick="event.stopPropagation(); openEntryDialog('${counter.id}')">+ Entry</button><button class="ghost" onclick="event.stopPropagation(); openEntryDialog('${counter.id}', true)">Old Entry</button><button class="ghost" onclick="event.stopPropagation(); openMenu('${counter.id}')">•••</button>`}</div></div>`;list.appendChild(wrap);enableSwipe(counter.id)})}function enableSwipe(id){const card=document.getElementById(`card-${id}`);if(!card)return;let sx=0,cx=0,drag=false;card.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;cx=sx;drag=true},{passive:true});card.addEventListener("touchmove",e=>{if(!drag)return;cx=e.touches[0].clientX;const delta=Math.min(0,cx-sx),clamped=Math.max(delta,-184);card.style.transform=`translateX(${clamped}px)`},{passive:true});card.addEventListener("touchend",()=>{if(!drag)return;drag=false;const delta=cx-sx;if(delta<-70){closeOpenSwipe(id);card.style.transform="translateX(-184px)";activeSwipeId=id}else{card.style.transform="translateX(0)";if(activeSwipeId===id)activeSwipeId=null}})}function closeOpenSwipe(except=null){if(activeSwipeId&&activeSwipeId!==except){const old=document.getElementById(`card-${activeSwipeId}`);if(old)old.style.transform="translateX(0)"}}function openDetail(id){closeOpenSwipe();const c=counters.find(x=>x.id===id);if(!c)return;document.getElementById("overview").classList.add("hidden");const detail=document.getElementById("detail");detail.classList.add("active");detail.style.setProperty("--accent",c.color||"#d7b56d");detail.innerHTML=`<div class="backrow"><button class="ghost" onclick="closeDetail()">← Back</button><button class="ghost" onclick="openMenu('${c.id}')">•••</button></div><div class="detail-hero"><div class="detail-content"><div class="detail-name"><div class="emoji">${escapeHtml(c.emoji||"📌")}</div><h2>${escapeHtml(c.name)}</h2></div><div class="big-count">${(c.entries||[]).length}</div><div class="counter-sub">Last entry: ${relativeLast(c.entries?.[0]?.dateTime)}</div>${c.archived?`<button class="big-plus success" onclick="restoreCounter('${c.id}')">Restore Counter</button>`:`<button class="big-plus gold" onclick="openEntryDialog('${c.id}')">+ Add Entry</button><div class="counter-actions"><button class="ghost" onclick="openEntryDialog('${c.id}', true)">Add Old Entry</button><button class="ghost" onclick="exportSingleCsv('${c.id}')">Export</button><button class="warning" onclick="archiveCounter('${c.id}')">Archive</button></div>`}</div></div><div class="section-title"><span>Timeline</span><span>${(c.entries||[]).length} entries</span></div><div class="entry-list">${(c.entries||[]).length===0?`<div class="empty">No entries yet.</div>`:(c.entries||[]).map(e=>`<div class="entry"><div><div class="entry-time">${formatDateTime(e.dateTime)}</div><div class="entry-note">${e.note?escapeHtml(e.note):"No note"}</div></div>${c.archived?"":`<button class="entry-delete" onclick="deleteEntry('${c.id}', '${e.id}')">×</button>`}</div>`).join("")}</div>`;window.scrollTo(0,0)}function closeDetail(){document.getElementById("detail").classList.remove("active");document.getElementById("detail").innerHTML="";document.getElementById("overview").classList.remove("hidden");renderOverview()}function setupSwatches(){const wrap=document.getElementById("swatches");wrap.innerHTML="";colors.forEach(color=>{const btn=document.createElement("button");btn.type="button";btn.className="swatch"+(color===selectedColor?" selected":"");btn.style.setProperty("--swatch",color);btn.onclick=()=>{selectedColor=color;document.getElementById("counterColor").value=color;setupSwatches()};wrap.appendChild(btn)})}function openCounterDialog(){selectedColor="#d7b56d";document.getElementById("counterModalTitle").textContent="New Counter";document.getElementById("editCounterId").value="";document.getElementById("counterEmoji").value="📌";document.getElementById("counterName").value="";document.getElementById("counterColor").value=selectedColor;setupSwatches();document.getElementById("counterDialog").showModal();setTimeout(()=>document.getElementById("counterName").focus(),60)}function editCounter(id){const c=counters.find(x=>x.id===id);if(!c)return;closeMenu();selectedColor=c.color||"#d7b56d";document.getElementById("counterModalTitle").textContent="Edit Counter";document.getElementById("editCounterId").value=c.id;document.getElementById("counterEmoji").value=c.emoji||"📌";document.getElementById("counterName").value=c.name;document.getElementById("counterColor").value=selectedColor;setupSwatches();document.getElementById("counterDialog").showModal()}function closeCounterDialog(){document.getElementById("counterDialog").close()}function saveCounter(event){event.preventDefault();const id=document.getElementById("editCounterId").value,name=document.getElementById("counterName").value.trim(),emoji=document.getElementById("counterEmoji").value.trim()||"📌",color=document.getElementById("counterColor").value||"#d7b56d";if(!name)return;if(id){const c=counters.find(x=>x.id===id);if(c){c.name=name;c.emoji=emoji;c.color=color}}else{counters.push({id:uid(),name,emoji,color,archived:false,createdAt:new Date().toISOString(),entries:[]})}save();closeCounterDialog();renderOverview();if(document.getElementById("detail").classList.contains("active")&&id)openDetail(id)}function openEntryDialog(id,old=false){const c=counters.find(x=>x.id===id);if(!c||c.archived)return;document.getElementById("activeCounterId").value=id;document.getElementById("entryTitle").textContent=old?"Add Old Entry":"New Entry";document.getElementById("entryDateTime").value=old?"":toDateTimeLocal();document.getElementById("entryNote").value="";document.getElementById("entryDialog").showModal()}function closeEntryDialog(){document.getElementById("entryDialog").close()}function saveEntry(event){event.preventDefault();const id=document.getElementById("activeCounterId").value,dateTime=document.getElementById("entryDateTime").value,note=document.getElementById("entryNote").value.trim(),c=counters.find(x=>x.id===id);if(!c||!dateTime||c.archived)return;c.entries=c.entries||[];c.entries.push({id:uid(),dateTime:new Date(dateTime).toISOString(),note});c.entries.sort((a,b)=>new Date(b.dateTime)-new Date(a.dateTime));save();closeEntryDialog();renderOverview();if(document.getElementById("detail").classList.contains("active"))openDetail(id)}function deleteEntry(cid,eid){const c=counters.find(x=>x.id===cid);if(!c)return;if(!confirm("Delete this entry? This cannot be undone."))return;c.entries=(c.entries||[]).filter(e=>e.id!==eid);save();renderOverview();openDetail(cid)}function archiveCounter(id){const c=counters.find(x=>x.id===id);if(!c)return;closeMenu();if(!confirm(`Archive "${c.name}"? You can restore it later.`))return;c.archived=true;save();if(document.getElementById("detail").classList.contains("active"))closeDetail();setViewMode("active")}function restoreCounter(id){const c=counters.find(x=>x.id===id);if(!c)return;c.archived=false;save();if(document.getElementById("detail").classList.contains("active"))closeDetail();setViewMode("archived")}function deleteCounter(id,permanent=false){const c=counters.find(x=>x.id===id);if(!c)return;closeMenu();const msg=permanent||c.archived?`Permanently delete "${c.name}"? All entries will be lost.`:`Delete "${c.name}"? Tip: archive it instead if you may need it later.`;if(!confirm(msg))return;counters=counters.filter(x=>x.id!==id);save();if(document.getElementById("detail").classList.contains("active"))closeDetail();renderOverview()}function duplicateCounter(id){const c=counters.find(x=>x.id===id);if(!c)return;closeMenu();counters.push({...JSON.parse(JSON.stringify(c)),id:uid(),name:`${c.name} Copy`,archived:false,createdAt:new Date().toISOString(),entries:[]});save();setViewMode("active")}function openMenu(id){const c=counters.find(x=>x.id===id);if(!c)return;document.getElementById("menuTitle").textContent=c.name;const menu=document.getElementById("menuList");menu.innerHTML=c.archived?`<button class="success" onclick="restoreCounter('${c.id}')"><span>Restore</span><span>↩</span></button><button class="ghost" onclick="exportSingleCsv('${c.id}')"><span>Export CSV</span><span>⇩</span></button><button class="danger" onclick="deleteCounter('${c.id}', true)"><span>Delete Permanently</span><span>×</span></button>`:`<button class="ghost" onclick="editCounter('${c.id}')"><span>Edit</span><span>✎</span></button><button class="ghost" onclick="duplicateCounter('${c.id}')"><span>Duplicate</span><span>⧉</span></button><button class="ghost" onclick="exportSingleCsv('${c.id}')"><span>Export CSV</span><span>⇩</span></button><button class="warning" onclick="archiveCounter('${c.id}')"><span>Archive</span><span>◴</span></button><button class="danger" onclick="deleteCounter('${c.id}', false)"><span>Delete</span><span>×</span></button>`;document.getElementById("menuDialog").showModal()}function closeMenu(){const d=document.getElementById("menuDialog");if(d.open)d.close()}function rowsFor(list){const rows=[["Counter","Status","Emoji","Date and Time","Note"]];list.forEach(c=>(c.entries||[]).forEach(e=>rows.push([c.name,c.archived?"Archived":"Active",c.emoji||"",formatDateTime(e.dateTime),e.note||""])));return rows}function downloadCsv(rows,fn){const csv=rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(";")).join("\n");downloadBlob(new Blob([csv],{type:"text/csv;charset=utf-8"}),fn)}function exportCsv(){downloadCsv(rowsFor(counters),"tallylog-export.csv")}function exportSingleCsv(id){const c=counters.find(x=>x.id===id);if(!c)return;closeMenu();downloadCsv(rowsFor([c]),`${c.name.replaceAll(" ","-").toLowerCase()}-export.csv`)}function exportJson(){downloadBlob(new Blob([JSON.stringify({version:"1.1",exportedAt:new Date().toISOString(),counters},null,2)],{type:"application/json"}),"tallylog-backup.json")}function downloadBlob(blob,fn){const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url)}if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}));renderOverview();
</script></body></html>
